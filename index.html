<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yến Lộc - Chơi Pikachu</title>
    <style>
        :root { 
            --tile-w: 42px; --tile-h: 54px; /* Kích thước chuẩn Pikachu */
            --cols: 4; --rows: 4; 
        }
        @media (min-width: 768px) { :root { --tile-w: 50px; --tile-h: 65px; } }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: #000 url('background.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1; }

        /* GIAO DIỆN CHÍNH */
        #game-view { display: none; position: relative; z-index: 5; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #game-board {
            display: grid;
            grid-template-columns: repeat(var(--cols), var(--tile-w));
            grid-template-rows: repeat(var(--rows), var(--tile-h));
            gap: 2px; padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            /* Chống vỡ khung trên mọi màn hình */
            transform: scale(min(1, calc(95vw / (var(--cols) * var(--tile-w) + 40px)), calc(75vh / (var(--rows) * var(--tile-h) + 100px))));
            transform-origin: center;
        }

        .tile { 
            width: var(--tile-w); height: var(--tile-h); 
            background-size: 100% 100%; background-repeat: no-repeat;
            border-radius: 3px; border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer; box-sizing: border-box; transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .tile.selected { border: 2.5px solid #00f2fe; box-shadow: 0 0 12px #00f2fe; z-index: 10; transform: scale(1.1); }
        .tile.matched { opacity: 0; pointer-events: none; transform: scale(0); }

        /* ĐIỀU KHIỂN */
        .timer-container { width: 200px; height: 8px; background: #222; border-radius: 5px; margin: 10px 0; border: 1px solid #00f2fe; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #00f2fe; }

        .controls { position: fixed; bottom: 20px; display: flex; gap: 8px; z-index: 100; flex-wrap: wrap; justify-content: center; }
        .btn-s { padding: 10px 15px; background: rgba(0,0,0,0.8); border: 1px solid #00f2fe; color: white; border-radius: 20px; font-size: 0.8rem; cursor: pointer; }

        /* BƯỚM */
        #butterfly-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
        .butterfly { position: absolute; font-size: 24px; animation: fly 10s linear forwards; }
        @keyframes fly { 0% { left: -50px; top: var(--sy); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { left: 110vw; top: var(--ey); opacity: 0; } }

        /* MENU & MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #00f2fe; text-align: center; width: 85%; max-width: 320px; }
        .menu-btn { width: 100%; padding: 15px; background: #00f2fe; color: black; border: none; border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <div id="butterfly-container"></div>
    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="start-screen" class="modal">
        <div class="modal-box">
            <h1 style="color:#00f2fe; margin-bottom:20px;">YÊN LỘC</h1>
            <input type="text" id="p-name" placeholder="Nhập tên..." maxlength="10" style="width:90%; padding:12px; border-radius:10px; text-align:center; font-size:1.1rem;">
            <button class="menu-btn" onclick="initGame()">BẮT ĐẦU</button>
            <button class="menu-btn" style="background:none; color:#00f2fe; border:1px solid #00f2fe;" onclick="showLeaderboard()">BẢNG VÀNG</button>
        </div>
    </div>

    <div id="game-view" style="display:none;">
        <div style="text-align: center; margin-bottom: 10px;">
            <h2 id="display-name" style="margin:0; color:#00f2fe;">PLAYER</h2>
            <div style="font-weight:bold;">LV: <span id="lv">1</span> | ĐIỂM: <span id="sc">0</span></div>
            <div class="timer-container"><div id="timer-bar"></div></div>
        </div>

        <div id="game-board"></div>

        <div class="controls">
            <button class="btn-s" onclick="shuffleBtn()">TRỘN HÌNH (<span id="sh-count">3</span>)</button>
            <button class="btn-s" onclick="toggleMusic()">🎵 Nhạc</button>
            <button class="btn-s" onclick="location.reload()">🏠 Menu</button>
        </div>
    </div>

    <div id="score-modal" class="modal" style="display:none;">
        <div class="modal-box">
            <h3 style="color:#fdfc47;">🏆 TOP CAO THỦ 🏆</h3>
            <div id="score-list" style="text-align:left; margin:15px 0;"></div>
            <button class="menu-btn" onclick="document.getElementById('score-modal').style.display='none'">ĐÓNG</button>
        </div>
    </div>

    <script>
        // CẤU HÌNH GITHUB
        const k1 = 'ghp_', k2 = '7VuzaHkjDkYFq9OOtcSmCGDsIjcXiX2SlH7W'; 
        const G_TOKEN = k1 + k2;
        const G_REPO = 'locvitinh-blip/chill';

        const levels = [
            { c: 4, r: 4, t: 100, g: "none" },   // Màn 1: Đứng yên
            { c: 6, r: 4, t: 150, g: "left" },   // Màn 2: Dạt trái
            { c: 6, r: 6, t: 200, g: "right" },  // Màn 3: Dạt phải
            { c: 8, r: 8, t: 350, g: "split" },  // Màn 4: Tách 2 bên
            { c: 10, r: 10, t: 500, g: "center" } // Màn 5: Gộp vào giữa
        ];

        let curLv = 0, score = 0, name = "", timer, timeLeft, board = [], selected = [], matched = 0, shuffles = 3;
        const imgs = Array.from({length: 15}, (_, i) => `images/con${i+1}.jpg`);

        function initGame() {
            name = document.getElementById('p-name').value || "DÂU - RY";
            document.getElementById('display-name').innerText = name.toUpperCase();
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-view').style.display = 'flex';
            loadLevel();
            setInterval(spawnButterfly, 4000); //
        }

        function loadLevel() {
            clearInterval(timer);
            const lv = levels[curLv];
            document.getElementById('lv').innerText = curLv + 1;
            document.documentElement.style.setProperty('--cols', lv.c);
            document.documentElement.style.setProperty('--rows', lv.r);
            
            timeLeft = lv.t; updateBar();
            timer = setInterval(() => {
                timeLeft--; updateBar();
                if(timeLeft <= 0) { alert("Hết giờ!"); location.reload(); }
            }, 1000);

            matched = 0; shuffles = 3; document.getElementById('sh-count').innerText = shuffles;
            generateBoard();
        }

        function generateBoard() {
            const lv = levels[curLv];
            let pairs = [];
            for(let i=0; i<(lv.c * lv.r)/2; i++) { pairs.push(i % imgs.length, i % imgs.length); }
            pairs.sort(() => Math.random() - 0.5);

            board = [];
            for(let r=0; r<lv.r; r++) {
                board[r] = [];
                for(let c=0; c<lv.c; c++) board[r][c] = pairs.pop();
            }
            render();
        }

        function render() {
            const container = document.getElementById('game-board');
            container.innerHTML = '';
            board.forEach((row, r) => {
                row.forEach((id, c) => {
                    const tile = document.createElement('div');
                    tile.className = id === -1 ? 'tile matched' : 'tile';
                    if(id !== -1) {
                        tile.style.backgroundImage = `url('${imgs[id]}')`;
                        tile.onclick = () => clickTile(r, c);
                    }
                    container.appendChild(tile);
                });
            });
        }

        function clickTile(r, c) {
            const el = document.querySelector(`#game-board div:nth-child(${r * levels[curLv].c + c + 1})`);
            if(selected.length === 1 && selected[0].r === r && selected[0].c === c) return;
            
            el.classList.add('selected');
            selected.push({r, c, id: board[r][c]});

            if(selected.length === 2) {
                const [a, b] = selected;
                if(a.id === b.id) { // Ăn điểm
                    setTimeout(() => {
                        board[a.r][a.c] = board[b.r][b.c] = -1;
                        score += 100; document.getElementById('sc').innerText = score;
                        matched += 2;
                        applyGravity(); // Thuật toán dạt hình
                        if(matched === levels[curLv].c * levels[curLv].r) nextLevel();
                        else checkDeadlock();
                    }, 300);
                } else {
                    setTimeout(() => render(), 400);
                }
                selected = [];
            }
        }

        // THUẬT TOÁN DI CHUYỂN (GRAVITY)
        function applyGravity() {
            const type = levels[curLv].g;
            if(type === "none") { render(); return; }

            board.forEach((row, r) => {
                let active = row.filter(id => id !== -1);
                let nextRow = new Array(row.length).fill(-1);

                if(type === "left") active.forEach((id, i) => nextRow[i] = id);
                else if(type === "right") active.forEach((id, i) => nextRow[row.length - active.length + i] = id);
                else if(type === "center") {
                    let start = Math.floor((row.length - active.length) / 2);
                    active.forEach((id, i) => nextRow[start + i] = id);
                }
                else if(type === "split") {
                    let mid = Math.floor(active.length / 2);
                    active.slice(0, mid).forEach((id, i) => nextRow[i] = id);
                    active.slice(mid).forEach((id, i) => nextRow[row.length - (active.length - mid) + i] = id);
                }
                board[r] = nextRow;
            });
            render();
        }

        function checkDeadlock() {
            let active = [];
            board.forEach((row, r) => row.forEach((id, c) => { if(id !== -1) active.push(id); }));
            let canMove = false;
            for(let i=0; i<active.length; i++) {
                if(active.filter(x => x === active[i]).length >= 2) { canMove = true; break; }
            }
            if(!canMove) { alert("Hết nước! Tự động trộn."); shuffleLogic(true); }
        }

        function shuffleLogic(auto) {
            if(!auto && shuffles <= 0) return;
            let currentImgs = [];
            board.forEach(row => row.forEach(id => { if(id !== -1) currentImgs.push(id); }));
            currentImgs.sort(() => Math.random() - 0.5);
            board.forEach((row, r) => row.forEach((id, c) => { if(id !== -1) board[r][c] = currentImgs.pop(); }));
            if(!auto) { shuffles--; document.getElementById('sh-count').innerText = shuffles; }
            render();
        }

        function shuffleBtn() { shuffleLogic(false); }

        function nextLevel() {
            score += 1000;
            saveScore();
            if(curLv < 4) { curLv++; loadLevel(); }
            else { alert("PHÁ ĐẢO!"); location.reload(); }
        }

        // TIỆN ÍCH
        function updateBar() { document.getElementById('timer-bar').style.width = (timeLeft/levels[curLv].t)*100 + '%'; }
        
        function spawnButterfly() {
            const b = document.createElement('div'); b.className = 'butterfly'; b.innerHTML = '🦋';
            b.style.setProperty('--sy', Math.random()*80+'vh');
            b.style.setProperty('--ey', Math.random()*80+'vh');
            document.getElementById('butterfly-container').appendChild(b);
            setTimeout(() => b.remove(), 10000);
        }

        function toggleMusic() {
            const m = document.getElementById('bg-music');
            m.paused ? m.play() : m.pause();
        }

        async function saveScore() {
            try {
                await fetch(`https://api.github.com/repos/${G_REPO}/issues`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${G_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: `SCORE: ${score}`, body: `Player: ${name}` })
                });
            } catch(e) {}
        }

        async function showLeaderboard() {
            const list = document.getElementById('score-list');
            document.getElementById('score-modal').style.display = 'flex';
            list.innerHTML = "Đang tải...";
            try {
                const res = await fetch(`https://api.github.com/repos/${G_REPO}/issues?state=all`);
                const data = await res.json();
                list.innerHTML = data.slice(0, 5).map(i => `<div>${i.body}: ${i.title}</div>`).join('');
            } catch(e) { list.innerHTML = "Lỗi kết nối GitHub."; }
        }
    </script>
</body>
</html>
