<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yến Lộc - 5 Màn Thử Thách</title>
    <style>
        :root { --tile-w: 14vw; --tile-h: 7.5vh; --cols: 4; --rows: 5; }
        @media (min-width: 600px) { :root { --tile-w: 60px; --tile-h: 75px; } }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: #000 url('background.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif;
            touch-action: none;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.3); z-index: 1; }
        
        #game-container {
            position: absolute; top: 42%; left: 50%; transform: translate(-50%, -50%);
            z-index: 5; display: flex; flex-direction: column; align-items: center; width: 100%;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(var(--cols), var(--tile-w));
            grid-template-rows: repeat(var(--rows), var(--tile-h));
            gap: 3px; padding: 5px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .tile {
            width: var(--tile-w); height: var(--tile-h);
            background-size: cover; background-position: center;
            border-radius: 4px; cursor: pointer;
            transition: 0.1s; border: 1.5px solid transparent;
        }
        .tile.selected { border-color: #00f2fe; box-shadow: 0 0 10px #00f2fe; transform: scale(1.05); z-index: 2; }
        .tile.matched { opacity: 0; visibility: hidden; pointer-events: none; }

        .game-header { color: white; text-align: center; text-shadow: 2px 2px 5px #000; margin-bottom: 5px; }
        h1 { font-size: 1.3rem; margin: 0; letter-spacing: 1px; }
        #level-info { font-size: 0.85rem; color: #00f2fe; font-weight: bold; margin-bottom: 3px; }

        .controls-wrapper {
            position: fixed; bottom: 20px; left: 0; right: 0;
            z-index: 100; display: flex; justify-content: center; gap: 10px;
        }

        .btn-chill {
            padding: 8px 15px; background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 20px;
            color: white; cursor: pointer; backdrop-filter: blur(5px); font-size: 0.75rem;
        }
        .btn-shuffle { background: rgba(0, 242, 254, 0.3); border-color: #00f2fe; }

        /* PHẦN CẤU HÌNH BƯỚM NHỎ */
        #butterfly-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; }
        .butterfly { 
            position: absolute; 
            width: 22px; /* Bướm nhỏ lại */
            height: 22px; 
            opacity: 0.8; /* Hơi mờ cho ảo diệu */
            pointer-events: none;
        }
        
        @keyframes fly-right { 
            0% { left: -10%; top: var(--t); transform: rotate(0deg); opacity: 0; } 
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { left: 110%; top: var(--et); transform: rotate(20deg); opacity: 0; } 
        }
        @keyframes fly-up { 
            0% { bottom: -10%; left: var(--l); transform: rotate(-10deg); opacity: 0; } 
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { bottom: 110%; left: var(--el); transform: rotate(10deg); opacity: 0; } 
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div id="game-container">
        <div class="game-header">
            <h1>DÂU VÀ RY</h1>
            <div id="level-info">MÀN 1</div>
        </div>
        <div id="game-board"></div>
        <button id="btn-shuffle" class="btn-chill btn-shuffle" style="margin-top:10px" onclick="manualShuffle()">Đổi Vị Trí (3)</button>
    </div>

    <div id="butterfly-container"></div>

    <div class="controls-wrapper">
        <button class="btn-chill" onclick="toggleButterflies()">🦋 Bướm</button>
        <button class="btn-chill" onclick="toggleMusic()">🎵 Nhạc</button>
        <button class="btn-chill" onclick="initLevel()">Chơi Lại</button>
    </div>

    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <script>
        const levels = [
            { name: "MÀN 1: KHỞI ĐẦU", cols: 4, rows: 4, tileW: "18vw", tileH: "10vh" },
            { name: "MÀN 2: DỄ THƯƠNG", cols: 4, rows: 6, tileW: "17vw", tileH: "9vh" },
            { name: "MÀN 3: GẮN KẾT", cols: 6, rows: 6, tileW: "14vw", tileH: "8vh" },
            { name: "MÀN 4: YÊU THƯƠNG", cols: 6, rows: 9, tileW: "13vw", tileH: "7vh" },
            { name: "MÀN 5: CỰC KHÓ", cols: 6, rows: 12, tileW: "11.5vw", tileH: "6.2vh" }
        ];

        let currentLevelIdx = 0;
        let shuffleCount = 3;
        const childImages = Array.from({length: 15}, (_, i) => `images/con${i+1}.jpg`);

        let board = []; 
        let selectedTiles = [];
        let matchedCount = 0;
        let isButterflyActive = true;

        function initLevel() {
            const level = levels[currentLevelIdx];
            const gameBoard = document.getElementById('game-board');
            document.getElementById('level-info').innerText = level.name;
            
            shuffleCount = 3; 
            updateShuffleButton();

            document.documentElement.style.setProperty('--cols', level.cols);
            document.documentElement.style.setProperty('--rows', level.rows);
            if(window.innerWidth <= 600) {
                document.documentElement.style.setProperty('--tile-w', level.tileW);
                document.documentElement.style.setProperty('--tile-h', level.tileH);
            }

            gameBoard.innerHTML = '';
            board = []; selectedTiles = []; matchedCount = 0;
            
            let tileList = [];
            const totalTiles = level.cols * level.rows;
            for (let i = 0; i < totalTiles / 2; i++) {
                let imgIdx = i % childImages.length;
                tileList.push(imgIdx, imgIdx);
            }
            tileList.sort(() => Math.random() - 0.5);

            for (let r = -1; r <= level.rows; r++) {
                board[r] = [];
                for (let c = -1; c <= level.cols; c++) {
                    if (r === -1 || r === level.rows || c === -1 || c === level.cols) {
                        board[r][c] = -1;
                    } else {
                        let imgIdx = tileList.pop();
                        board[r][c] = imgIdx;
                        createTileUI(r, c, imgIdx);
                    }
                }
            }
            checkBoardStatus();
        }

        function createTileUI(r, c, imgIdx) {
            const gameBoard = document.getElementById('game-board');
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.id = `tile-${r}-${c}`;
            tile.style.backgroundImage = `url('${childImages[imgIdx]}')`;
            tile.onclick = () => handleTileClick(r, c);
            gameBoard.appendChild(tile);
        }

        function handleTileClick(r, c) {
            if (board[r][c] === -1) return;
            const tile = document.getElementById(`tile-${r}-${c}`);
            if (selectedTiles.length === 1 && selectedTiles[0].r === r && selectedTiles[0].c === c) {
                tile.classList.remove('selected'); selectedTiles = []; return;
            }
            tile.classList.add('selected');
            selectedTiles.push({ r, c, idx: board[r][c] });

            if (selectedTiles.length === 2) {
                const t1 = selectedTiles[0], t2 = selectedTiles[1];
                const level = levels[currentLevelIdx];
                if (t1.idx === t2.idx && checkConnect(t1, t2, level.rows, level.cols)) {
                    setTimeout(() => {
                        document.getElementById(`tile-${t1.r}-${t1.c}`).classList.add('matched');
                        document.getElementById(`tile-${t2.r}-${t2.c}`).classList.add('matched');
                        board[t1.r][t1.c] = board[t2.r][t2.c] = -1;
                        matchedCount += 2;
                        if (matchedCount === level.rows * level.cols) nextLevel();
                        else checkBoardStatus();
                    }, 200);
                } else {
                    setTimeout(() => {
                        document.getElementById(`tile-${t1.r}-${t1.c}`).classList.remove('selected');
                        document.getElementById(`tile-${t2.r}-${t2.c}`).classList.remove('selected');
                    }, 400);
                }
                selectedTiles = [];
            }
        }

        function checkBoardStatus() {
            const level = levels[currentLevelIdx];
            let hasMove = false;
            let activeTiles = [];
            for (let r = 0; r < level.rows; r++) {
                for (let c = 0; c < level.cols; c++) {
                    if (board[r][c] !== -1) activeTiles.push({ r, c, idx: board[r][c] });
                }
            }
            for (let i = 0; i < activeTiles.length; i++) {
                for (let j = i + 1; j < activeTiles.length; j++) {
                    if (activeTiles[i].idx === activeTiles[j].idx && checkConnect(activeTiles[i], activeTiles[j], level.rows, level.cols)) {
                        hasMove = true; break;
                    }
                }
                if (hasMove) break;
            }
            if (!hasMove && matchedCount < level.rows * level.cols) {
                if (shuffleCount > 0) {
                    alert("Hết nước đi! Hệ thống tự động đảo bài.");
                    manualShuffle(true);
                } else {
                    alert("Hết lượt đổi vị trí! Bạn phải chơi lại màn này.");
                    initLevel();
                }
            }
        }

        function manualShuffle(isAuto = false) {
            if (!isAuto && shuffleCount <= 0) return;
            const level = levels[currentLevelIdx];
            let currentImages = [];
            for (let r = 0; r < level.rows; r++) {
                for (let c = 0; c < level.cols; c++) {
                    if (board[r][c] !== -1) currentImages.push(board[r][c]);
                }
            }
            currentImages.sort(() => Math.random() - 0.5);
            let idx = 0;
            for (let r = 0; r < level.rows; r++) {
                for (let c = 0; c < level.cols; c++) {
                    if (board[r][c] !== -1) {
                        board[r][c] = currentImages[idx++];
                        const tile = document.getElementById(`tile-${r}-${c}`);
                        tile.style.backgroundImage = `url('${childImages[board[r][c]]}')`;
                        tile.classList.remove('selected');
                    }
                }
            }
            shuffleCount--;
            updateShuffleButton();
            checkBoardStatus();
        }

        function updateShuffleButton() {
            const btn = document.getElementById('btn-shuffle');
            btn.innerText = `Đổi Vị Trí (${shuffleCount < 0 ? 0 : shuffleCount})`;
            btn.style.opacity = shuffleCount <= 0 ? "0.5" : "1";
        }

        function checkConnect(p1, p2, maxR, maxC) {
            const isEmpty = (r, c) => (r >= -1 && r <= maxR && c >= -1 && c <= maxC && board[r][c] === -1);
            const checkL = (v1, v2, f, isR) => {
                for (let i = Math.min(v1, v2) + 1; i < Math.max(v1, v2); i++)
                    if (isR ? !isEmpty(f, i) : !isEmpty(i, f)) return false;
                return true;
            };
            if (p1.r === p2.r && checkL(p1.c, p2.c, p1.r, true)) return true;
            if (p1.c === p2.c && checkL(p1.r, p2.r, p1.c, false)) return true;
            if (isEmpty(p1.r, p2.c) && checkL(p1.c, p2.c, p1.r, true) && checkL(p1.r, p2.r, p2.c, false)) return true;
            if (isEmpty(p2.r, p1.c) && checkL(p1.r, p2.r, p1.c, false) && checkL(p1.c, p2.c, p2.r, true)) return true;
            for (let r = -1; r <= maxR; r++)
                if (isEmpty(r, p1.c) && checkL(p1.r, r, p1.c, false) && isEmpty(r, p2.c) && checkL(p1.c, p2.c, r, true) && checkL(r, p2.r, p2.c, false)) return true;
            for (let c = -1; c <= maxC; c++)
                if (isEmpty(p1.r, c) && checkL(p1.c, c, p1.r, true) && isEmpty(p2.r, c) && checkL(p1.r, p2.r, c, false) && checkL(c, p2.c, p2.r, true)) return true;
            return false;
        }

        function nextLevel() {
            if (currentLevelIdx < levels.length - 1) {
                alert("Xuất sắc! Chào mừng đến với " + levels[currentLevelIdx+1].name);
                currentLevelIdx++;
                initLevel();
            } else {
                alert("Vỡ òa! Bạn đã vượt qua tất cả các màn!");
                currentLevelIdx = 0;
                initLevel();
            }
        }

        // HÀM TẠO BƯỚM NHỎ
        function createButterfly() {
            if (!isButterflyActive) return;
            const container = document.getElementById('butterfly-container');
            const b = document.createElement('img');
            // ĐẢM BẢO FILE NÀY TỒN TẠI TRÊN GITHUB CỦA BẠN
            b.src = 'butterfly.gif'; 
            b.className = 'butterfly';
            b.style.setProperty('--t', Math.random() * 80 + 10 + '%');
            b.style.setProperty('--et', Math.random() * 80 + 10 + '%');
            b.style.setProperty('--l', Math.random() * 80 + 10 + '%');
            b.style.setProperty('--el', Math.random() * 80 + 10 + '%');
            
            // Bay chậm và mượt hơn (10s - 15s)
            b.style.animation = (Math.random() > 0.5 ? 'fly-right' : 'fly-up') + ' ' + (Math.random()*5+10) + 's linear forwards';
            
            container.appendChild(b);
            setTimeout(() => b.remove(), 15500);
        }

        function toggleButterflies() {
            isButterflyActive = !isButterflyActive;
            const container = document.getElementById('butterfly-container');
            if (!isButterflyActive) container.innerHTML = '';
        }

        function toggleMusic() {
            const m = document.getElementById('bg-music');
            m.paused ? m.play() : m.pause();
        }

        window.onload = () => { 
            initLevel(); 
            // Cứ 5 giây tạo 1 con bướm mới
            setInterval(createButterfly, 5000); 
        };
    </script>
</body>
</html>
