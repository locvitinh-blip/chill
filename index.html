<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pikachu Legend 2026 1</title>
    <style>
        :root { --tile-w: 42px; --tile-h: 54px; --cols: 4; --rows: 4; }
        @media (min-width: 768px) { :root { --tile-w: 50px; --tile-h: 65px; } }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000 url('background.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white;
            overflow: hidden; touch-action: none;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1; }

        #game-view { 
            position: relative; z-index: 5; display: none; flex-direction: column; 
            width: 100vw; height: 100vh; 
        }

        .header-controls {
            padding: 10px; background: rgba(0,0,0,0.95);
            border-bottom: 2px solid #00f2fe;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .stats { display: flex; gap: 15px; font-weight: bold; font-size: 0.9rem; color: #00f2fe; }
        .btn-group { display: flex; gap: 8px; margin-top: 5px; }
        
        .game-container {
            flex: 1; overflow: auto; display: block;
            padding: 100px 40px; 
            -webkit-overflow-scrolling: touch; text-align: center;
        }

        #game-board {
            display: inline-grid;
            grid-template-columns: repeat(var(--cols), var(--tile-w));
            grid-template-rows: repeat(var(--rows), var(--tile-h));
            gap: 3px; background: rgba(255, 255, 255, 0.05);
            padding: 15px; border-radius: 10px; border: 1px solid rgba(0,242,254,0.3);
        }

        .tile { 
            width: var(--tile-w); height: var(--tile-h); 
            background-size: 100% 100%; background-repeat: no-repeat;
            border-radius: 4px; border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer; box-sizing: border-box;
        }
        .tile.selected { border: 3px solid #fdfc47; box-shadow: 0 0 10px #fdfc47; z-index: 10; }
        .tile.matched { opacity: 0 !important; pointer-events: none; visibility: hidden; }

        .timer-container { width: 150px; height: 6px; background: #222; border-radius: 10px; border: 1px solid #00f2fe; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #00f2fe; }

        .btn-s { padding: 8px 12px; background: #222; border: 1px solid #00f2fe; color: white; border-radius: 15px; font-size: 0.75rem; cursor: pointer; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #00f2fe; text-align: center; width: 80%; max-width: 300px; }
        .menu-btn { width: 100%; padding: 12px; background: #00f2fe; color: black; border: none; border-radius: 50px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="start-screen" class="modal">
        <div class="modal-box">
            <h1 style="color:#00f2fe;">DÂU - RY</h1>
            <input type="text" id="p-name" placeholder="Tên của bạn..." maxlength="10" style="width:90%; padding:10px; margin-bottom:10px; border-radius:8px; text-align:center; background:#333; color:white; border:1px solid #00f2fe;">
            <button class="menu-btn" onclick="initGame()">VÀO GAME</button>
            <button class="menu-btn" style="background:none; color:#00f2fe; border:1px solid #00f2fe;" onclick="showLeaderboard()">BẢNG XẾP HẠNG</button>
        </div>
    </div>

    <div id="game-view">
        <div class="header-controls">
            <div class="stats">
                <span>LV: <b id="lv">1</b></span>
                <span>ĐIỂM: <b id="sc">0</b></span>
                <span>TRỘN: <b id="sh-count">3</b></span>
            </div>
            <div class="timer-container"><div id="timer-bar"></div></div>
            <div class="btn-group">
                <button class="btn-s" onclick="shuffleBtn()">TRỘN HÌNH</button>
                <button class="btn-s" onclick="toggleMusic()">NHẠC</button>
                <button class="btn-s" onclick="location.reload()">MENU</button>
            </div>
        </div>
        <div class="game-container"><div id="game-board"></div></div>
    </div>

    <div id="score-modal" class="modal" style="display:none;">
        <div class="modal-box">
            <h3 style="color:#fdfc47;">🏆 CAO THỦ 🏆</h3>
            <div id="score-list" style="text-align:left; margin:15px 0; font-size: 0.9rem;"></div>
            <button class="menu-btn" onclick="document.getElementById('score-modal').style.display='none'">ĐÓNG</button>
        </div>
    </div>

    <script>
        // --- CHỖ NHẬP TOKEN CỦA BẠN ---
        const G_TOKEN = 'ghp_' + '7VuzaHkjDkYFq9OOtcSmCGDsIjcXiX2SlH7W'; 
        const G_REPO = 'locvitinh-blip/chill'; 

        const levels = [
            { c: 4, r: 5, t: 120, g: "none" },
            { c: 6, r: 8, t: 180, g: "left" },
            { c: 8, r: 10, t: 300, g: "right" },
            { c: 8, r: 12, t: 450, g: "split" },
            { c: 10, r: 14, t: 600, g: "center" }
        ];

        let curLv = 0, score = 0, name = "", timer, timeLeft, board = [], selected = [], matched = 0, shuffles = 3, isProcessing = false;
        const imgs = Array.from({length: 15}, (_, i) => `images/con${i+1}.jpg`);

        function initGame() {
            name = document.getElementById('p-name').value || "Dâu Ry";
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-view').style.display = 'flex';
            loadLevel();
        }

        function loadLevel() {
            clearInterval(timer);
            const lv = levels[curLv];
            document.getElementById('lv').innerText = curLv + 1;
            document.documentElement.style.setProperty('--cols', lv.c);
            document.documentElement.style.setProperty('--rows', lv.r);
            timeLeft = lv.t; updateBar();
            timer = setInterval(() => { timeLeft--; updateBar(); if(timeLeft <= 0) { alert("Hết giờ!"); location.reload(); } }, 1000);
            
            matched = 0;
            shuffles = 3; 
            document.getElementById('sh-count').innerText = shuffles;
            isProcessing = false; // QUAN TRỌNG: Giải phóng khóa khi qua màn
            selected = [];
            generateBoard();
        }

        function generateBoard() {
            const lv = levels[curLv];
            let pairs = [];
            for(let i=0; i<(lv.c * lv.r)/2; i++) { pairs.push(i % imgs.length, i % imgs.length); }
            pairs.sort(() => Math.random() - 0.5);
            
            const container = document.getElementById('game-board');
            container.innerHTML = ''; 
            board = [];

            for(let r=0; r<lv.r; r++) {
                board[r] = [];
                for(let c=0; c<lv.c; c++) {
                    const id = pairs.pop(); board[r][c] = id;
                    const tile = document.createElement('div');
                    tile.id = `t-${r}-${c}`; tile.className = 'tile';
                    tile.style.backgroundImage = `url('${imgs[id]}')`;
                    tile.onclick = () => clickTile(r, c);
                    container.appendChild(tile);
                }
            }
            setTimeout(checkDeadlock, 500);
        }

        function clickTile(r, c) {
            if (isProcessing || board[r][c] === -1) return;
            
            const tileEl = document.getElementById(`t-${r}-${c}`);
            if (selected.length === 1 && selected[0].r === r && selected[0].c === c) {
                tileEl.classList.remove('selected'); selected = []; return;
            }

            tileEl.classList.add('selected');
            selected.push({r, c, id: board[r][c]});

            if(selected.length === 2) {
                isProcessing = true;
                const [a, b] = selected;
                if(a.id === b.id) {
                    // Ẩn ngay lập tức
                    document.getElementById(`t-${a.r}-${a.c}`).classList.add('matched');
                    document.getElementById(`t-${b.r}-${b.c}`).classList.add('matched');
                    
                    setTimeout(() => {
                        board[a.r][a.c] = board[b.r][b.c] = -1;
                        score += 100; document.getElementById('sc').innerText = score;
                        matched += 2;
                        applyGravity();
                        
                        if(matched === levels[curLv].c * levels[curLv].r) {
                            setTimeout(nextLevel, 300);
                        } else {
                            setTimeout(() => {
                                checkDeadlock();
                                isProcessing = false; // Giải phóng sau khi dạt xong
                            }, 400);
                        }
                    }, 150);
                } else {
                    score = Math.max(0, score - 5); document.getElementById('sc').innerText = score;
                    setTimeout(() => {
                        document.getElementById(`t-${a.r}-${a.c}`).classList.remove('selected');
                        document.getElementById(`t-${b.r}-${b.c}`).classList.remove('selected');
                        isProcessing = false;
                    }, 300);
                }
                selected = [];
            }
        }

        function applyGravity() {
            const type = levels[curLv].g;
            if(type === "none") { refreshUI(); return; }
            board.forEach((row, r) => {
                let active = row.filter(id => id !== -1);
                let nextRow = new Array(row.length).fill(-1);
                if(type === "left") active.forEach((id, i) => nextRow[i] = id);
                else if(type === "right") active.forEach((id, i) => nextRow[row.length - active.length + i] = id);
                else if(type === "center") {
                    let start = Math.floor((row.length - active.length) / 2);
                    active.forEach((id, i) => nextRow[start + i] = id);
                }
                else if(type === "split") {
                    let mid = Math.floor(active.length / 2);
                    active.slice(0, mid).forEach((id, i) => nextRow[i] = id);
                    active.slice(mid).forEach((id, i) => nextRow[row.length - (active.length - mid) + i] = id);
                }
                board[r] = nextRow;
            });
            refreshUI();
        }

        function refreshUI() {
            board.forEach((row, r) => {
                row.forEach((id, c) => {
                    const tile = document.getElementById(`t-${r}-${c}`);
                    if (id === -1) {
                        tile.classList.add('matched');
                        tile.style.backgroundImage = 'none';
                    } else {
                        tile.classList.remove('matched');
                        tile.style.backgroundImage = `url('${imgs[id]}')`;
                    }
                    tile.classList.remove('selected');
                });
            });
        }

        function checkDeadlock() {
            let active = [];
            board.forEach(row => row.forEach(id => { if(id !== -1) active.push(id); }));
            if (active.length === 0) return;

            let counts = {};
            active.forEach(id => counts[id] = (counts[id] || 0) + 1);
            
            let hasPairs = false;
            for(let id in counts) { if(counts[id] >= 2) { hasPairs = true; break; } }

            if(!hasPairs) {
                if(shuffles > 0) {
                    console.log("Deadlock detected, shuffling...");
                    shuffleLogic(true);
                } else {
                    alert("HẾT NƯỚC ĐI!");
                    saveScore(); location.reload();
                }
            }
        }

        function shuffleLogic(auto) {
            let currentImgs = [];
            board.forEach(row => row.forEach(id => { if(id !== -1) currentImgs.push(id); }));
            
            // Xáo trộn cho đến khi chắc chắn có ít nhất 1 cặp (nếu số lượng hình > 0)
            currentImgs.sort(() => Math.random() - 0.5);
            
            board.forEach((row, r) => {
                row.forEach((id, c) => { if(board[r][c] !== -1) board[r][c] = currentImgs.pop(); });
            });
            
            if(!auto) { shuffles--; document.getElementById('sh-count').innerText = shuffles; }
            refreshUI();
            
            // Đợi UI cập nhật rồi kiểm tra lại deadlock lần nữa
            setTimeout(checkDeadlock, 500);
        }

        function shuffleBtn() { if(!isProcessing && shuffles > 0) shuffleLogic(false); }
        
        function nextLevel() {
            if (curLv < levels.length - 1) {
                curLv++;
                loadLevel();
            } else {
                alert("BẠN ĐÃ PHÁ ĐẢO!");
                saveScore();
                location.reload();
            }
        }

        function updateBar() { document.getElementById('timer-bar').style.width = (timeLeft/levels[curLv].t)*100 + '%'; }
        function toggleMusic() { const m = document.getElementById('bg-music'); m.paused ? m.play() : m.pause(); }

        async function saveScore() { try { await fetch(`https://api.github.com/repos/${G_REPO}/issues`, { method: 'POST', headers: { 'Authorization': `token ${G_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ title: `Điểm: ${score}`, body: `Người chơi: ${name}` }) }); } catch(e) {} }
        
        async function showLeaderboard() {
            const list = document.getElementById('score-list');
            document.getElementById('score-modal').style.display = 'flex';
            list.innerHTML = "Đang tải...";
            try {
                const res = await fetch(`https://api.github.com/repos/${G_REPO}/issues?state=all`);
                const data = await res.json();
                list.innerHTML = data.slice(0, 5).map(i => `<div>${i.body}: ${i.title}</div>`).join('');
            } catch(e) { list.innerHTML = "Lỗi kết nối."; }
        }
    </script>
</body>
</html>
