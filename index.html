<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yến Lộc - Chơi cùng các con</title>
    <style>
    :root { 
        /* Kích thước chuẩn cho điện thoại */
        --tile-w: 48px; 
        --tile-h: 60px; 
        --cols: 4; 
        --rows: 4; 
    }

    /* Khóa kích thước trên máy tính để không bị to quá khổ */
    @media (min-width: 768px) {
        :root {
            --tile-w: 55px; 
            --tile-h: 70px;
        }
    }

    body, html {
        margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
        background: #000 url('background.jpg') no-repeat center center fixed;
        background-size: cover; font-family: 'Segoe UI', sans-serif;
    }

    /* Lớp phủ mờ giúp nổi bật bảng game */
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1; }

    #game-container {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 5; display: flex; flex-direction: column; align-items: center;
        width: 95%; max-height: 90vh;
    }

    #game-board {
        display: grid;
        grid-template-columns: repeat(var(--cols), var(--tile-w));
        grid-template-rows: repeat(var(--rows), var(--tile-h));
        gap: 3px;
        padding: 5px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        /* Nếu bảng quá lớn (Màn 5), nó sẽ tự thu nhỏ lại để vừa màn hình */
        zoom: 0.9; 
    }
    
    /* Chống tràn cho màn hình cực nhỏ */
    @media (max-height: 600px) { #game-board { zoom: 0.7; } }

    .tile { 
        width: var(--tile-w); height: var(--tile-h); 
        background-size: 100% 100%; background-repeat: no-repeat;
        border-radius: 4px; border: 1px solid rgba(255,255,255,0.2);
        box-sizing: border-box; cursor: pointer;
    }

    .tile.selected { border: 2px solid #00f2fe; box-shadow: 0 0 10px #00f2fe; z-index: 10; }
    .tile.matched { opacity: 0; pointer-events: none; }

    .timer-container { width: 200px; height: 8px; background: rgba(0,0,0,0.3); border-radius: 10px; margin: 10px 0; border: 1px solid #00f2fe; overflow: hidden; }
    #timer-bar { width: 100%; height: 100%; background: #00f2fe; transition: width 0.3s; }
</style>
</head>
<body>

    <div class="overlay"></div>

    <div id="main-menu">
        <div class="logo-title">DÂU VÀ RY</div>
        <button class="menu-btn" onclick="showNameInput()">BẮT ĐẦU CHƠI</button>
        <button class="menu-btn" onclick="showLeaderboard()">BẢNG XẾP HẠNG</button>
        <div style="margin-top: 10px; font-size: 0.8rem; color: #00f2fe;">Lộc Vi Tính Design</div>
    </div>

    <div id="name-modal" class="modal">
        <div class="modal-content">
            <h2 style="color:#00f2fe; margin-top:0;">GHI DANH</h2>
            <p>Hãy nhập tên của bạn để lưu kỷ lục:</p>
            <input type="text" id="player-name" placeholder="Tên nghệ danh..." maxlength="12" style="padding:15px; width:85%; text-align:center; border-radius:10px; border:none; margin-bottom:20px; font-size:1.2rem; background: rgba(255,255,255,0.9);">
            <button class="menu-btn" style="width:100%" onclick="startGame()">VÀO TRẬN</button>
            <button class="btn-small" style="margin-top:15px; border:none; color:#aaa;" onclick="closeModal('name-modal')">Hủy bỏ</button>
        </div>
    </div>

    <div id="game-view">
        <div id="game-container">
            <div class="game-info">
                <h2 id="display-name" style="margin:0; color:#00f2fe; letter-spacing:3px;">YÊN LỘC</h2>
                <div style="font-weight:bold; font-size:1.1rem;">
                    LEVEL: <span id="lv-num">1</span> | ĐIỂM: <span id="score-num" style="color:#fdfc47;">0</span>
                </div>
                <div id="sync-status" class="sync-text"></div>
            </div>

            <div class="timer-container"><div id="timer-bar"></div></div>
            <div id="game-board"></div>
            
            <button id="btn-shuffle" class="btn-small" style="margin-top:15px; border: 2px solid #00f2fe; width: 180px; font-weight:bold;" onclick="manualShuffle()">ĐỔI VỊ TRÍ (3)</button>
        </div>

        <div class="controls-wrapper">
            <button class="btn-small" onclick="toggleButterflies()">🦋 Bướm: Bật</button>
            <button class="btn-small" id="btn-music" onclick="toggleMusic()">🎵 Nhạc: Tắt</button>
            <button class="btn-small" onclick="confirmBackToMenu()">🏠 Về Menu</button>
        </div>
    </div>

    <div id="score-modal" class="modal">
        <div class="modal-content">
            <h3 style="color:#fdfc47; margin-top:0;">🏆 TOP CAO THỦ GIA ĐÌNH 🏆</h3>
            <div id="leaderboard-list">Đang kết nối GitHub...</div>
            <button class="menu-btn" style="width:100%" onclick="closeScoreBoard()">ĐÓNG</button>
        </div>
    </div>

    <div id="butterfly-container"></div>
    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <script>
        // ==========================================
        // --- CẤU HÌNH GITHUB (ĐIỀN TẠI ĐÂY) ---
        const p1 = 'ghp_'; 
        const p2 = '7VuzaHkjDkYFq9OOtcSmCGDsIjcXiX2SlH7W'; // Dán mã token sau chữ ghp_ vào đây
        const GITHUB_TOKEN = p1 + p2; 
        const REPO = 'locvitinh-blip/chill'; // Ví dụ: yenloc/pikachu-game
        // ==========================================

        const levels = [
            { cols: 4, rows: 4, time: 60,  bonus: 500 },
            { cols: 4, rows: 6, time: 100, bonus: 1000 },
            { cols: 6, rows: 6, time: 150, bonus: 1500 },
            { cols: 8, rows: 8, time: 250, bonus: 2500 },
            { cols: 10, rows: 12, time: 400, bonus: 5000 } // MÀN 5 CỰC KHÓ
        ];

        let playerName = "Ẩn danh"; let score = 0; let currentLevelIdx = 0;
        let timeLeft = 0; let timerInterval; let shuffleCount = 3;
        let isButterflyActive = true; let isMusicPlaying = false;
        const childImages = Array.from({length: 15}, (_, i) => `images/con${i+1}.jpg`);
        let board = []; let selectedTiles = []; let matchedCount = 0;

        // --- HÀM ĐIỀU HƯỚNG ---
        function showNameInput() { document.getElementById('name-modal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function confirmBackToMenu() {
            if(confirm("Bạn muốn bỏ dở ván chơi để về Menu?")) backToMenu();
        }

        function backToMenu() {
            clearInterval(timerInterval);
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
            score = 0; currentLevelIdx = 0;
        }

        function startGame() {
            const input = document.getElementById('player-name').value.trim();
            if (input) playerName = input;
            document.getElementById('display-name').innerText = playerName.toUpperCase();
            document.getElementById('name-modal').style.display = 'none';
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            score = 0; currentLevelIdx = 0;
            initLevel();
            if (!window.bfInterval) window.bfInterval = setInterval(createButterfly, 4000);
        }

        // --- KHỞI TẠO MÀN CHƠI ---
        function initLevel() {
            clearInterval(timerInterval);
            const level = levels[currentLevelIdx];
            document.getElementById('lv-num').innerText = currentLevelIdx + 1;
            document.getElementById('score-num').innerText = score;
            timeLeft = level.time; updateTimerBar(); startTimer();
            shuffleCount = 3; updateShuffleButton();
            
            document.documentElement.style.setProperty('--cols', level.cols);
            document.documentElement.style.setProperty('--rows', level.rows);
            
            // Tối ưu kích thước ô cho màn hình nhỏ khi chơi màn 5
            if (level.cols > 8) {
                document.documentElement.style.setProperty('--tile-w', '9vw');
                document.documentElement.style.setProperty('--tile-h', '5.5vh');
            } else {
                document.documentElement.style.setProperty('--tile-w', '14vw');
                document.documentElement.style.setProperty('--tile-h', '7.5vh');
            }

            const gameBoard = document.getElementById('game-board');
            gameBoard.innerHTML = ''; board = []; selectedTiles = []; matchedCount = 0;
            
            let tileList = [];
            for (let i = 0; i < (level.cols * level.rows) / 2; i++) {
                let imgIdx = i % childImages.length;
                tileList.push(imgIdx, imgIdx);
            }
            tileList.sort(() => Math.random() - 0.5);

            for (let r = -1; r <= level.rows; r++) {
                board[r] = [];
                for (let c = -1; c <= level.cols; c++) {
                    if (r === -1 || r === level.rows || c === -1 || c === level.cols) board[r][c] = -1;
                    else {
                        let imgIdx = tileList.pop(); board[r][c] = imgIdx;
                        const tile = document.createElement('div');
                        tile.className = 'tile'; tile.id = `tile-${r}-${c}`;
                        tile.style.backgroundImage = `url('${childImages[imgIdx]}')`;
                        tile.onclick = () => handleTileClick(r, c);
                        gameBoard.appendChild(tile);
                    }
                }
            }
            checkBoardStatus();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--; updateTimerBar();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    saveScoreToGitHub(); 
                    alert("HẾT GIỜ! Điểm đã được ghi nhận vào Bảng Vàng.");
                    initLevel();
                }
            }, 1000);
        }

        function updateTimerBar() {
            const bar = document.getElementById('timer-bar');
            const percent = (timeLeft / levels[currentLevelIdx].time) * 100;
            bar.style.width = Math.max(0, percent) + "%";
            bar.style.background = percent < 20 ? "#ff4b2b" : "#00f2fe";
        }

        // --- XỬ LÝ CLICK ---
        function handleTileClick(r, c) {
            if (board[r][c] === -1) return;
            const tile = document.getElementById(`tile-${r}-${c}`);
            
            // Bỏ chọn nếu nhấn lại ô cũ
            if (selectedTiles.length === 1 && selectedTiles[0].r === r && selectedTiles[0].c === c) {
                tile.classList.remove('selected'); selectedTiles = []; return;
            }
            
            tile.classList.add('selected');
            selectedTiles.push({ r, c, idx: board[r][c] });

            if (selectedTiles.length === 2) {
                const [t1, t2] = selectedTiles;
                const level = levels[currentLevelIdx];
                
                if (t1.idx === t2.idx && checkConnect(t1, t2, level.rows, level.cols)) {
                    // Nối đúng
                    setTimeout(() => {
                        document.getElementById(`tile-${t1.r}-${t1.c}`).classList.add('matched');
                        document.getElementById(`tile-${t2.r}-${t2.c}`).classList.add('matched');
                        board[t1.r][t1.c] = board[t2.r][t2.c] = -1; matchedCount += 2;
                        score += 100; document.getElementById('score-num').innerText = score;
                        if (matchedCount === level.rows * level.cols) nextLevel();
                        else checkBoardStatus();
                    }, 200);
                } else {
                    // Nối sai
                    const el1 = document.getElementById(`tile-${t1.r}-${t1.c}`);
                    const el2 = document.getElementById(`tile-${t2.r}-${t2.c}`);
                    el1.classList.add('wrong'); el2.classList.add('wrong');
                    score = Math.max(0, score - 50); // Trừ 50 điểm
                    timeLeft = Math.max(0, timeLeft - 3); // Trừ 3 giây
                    document.getElementById('score-num').innerText = score;
                    setTimeout(() => {
                        el1.classList.remove('selected', 'wrong');
                        el2.classList.remove('selected', 'wrong');
                    }, 400);
                }
                selectedTiles = [];
            }
        }

        function nextLevel() {
            clearInterval(timerInterval);
            const timeBonus = timeLeft * 50;
            score += (levels[currentLevelIdx].bonus + timeBonus);
            saveScoreToGitHub(); // Lưu điểm sau mỗi màn thắng
            alert(`THẮNG MÀN ${currentLevelIdx + 1}!\nThưởng thời gian: +${timeBonus}`);
            
            if (currentLevelIdx < levels.length - 1) {
                currentLevelIdx++;
                initLevel();
            } else {
                alert("XUẤT SẮC! BẠN ĐÃ VƯỢT QUA 5 THỬ THÁCH CỦA YÊN LỘC!");
                showLeaderboard();
            }
        }

        function closeScoreBoard() {
            closeModal('score-modal');
            // Nếu đã thắng màn 5 thì về menu
            if (currentLevelIdx === levels.length - 1 && matchedCount === (levels[currentLevelIdx].cols * levels[currentLevelIdx].rows)) {
                backToMenu();
            }
        }

        // --- KẾT NỐI GITHUB ---
        async function saveScoreToGitHub() {
            const status = document.getElementById('sync-status');
            status.innerText = "🔄 Đang đồng bộ điểm Online...";
            const data = { title: `SCORE: ${score}`, body: `Player: ${playerName} | Date: ${new Date().toLocaleString()}` };
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO}/issues`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if(response.ok) {
                    status.innerText = "✅ Đã cập nhật Bảng Vàng GitHub";
                    setTimeout(() => status.innerText = "", 3000);
                }
            } catch (e) { status.innerText = "❌ Lỗi lưu GitHub"; }
        }

        async function showLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            document.getElementById('score-modal').style.display = 'flex';
            list.innerHTML = "Đang tải dữ liệu...";
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/issues?state=all&per_page=100`);
                const issues = await res.json();
                let scores = issues.filter(i => i.title.startsWith('SCORE:'))
                    .map(i => ({ 
                        name: i.body.split('|')[0].replace('Player: ', '').trim(), 
                        score: parseInt(i.title.replace('SCORE: ', '')) 
                    }))
                    .sort((a, b) => b.score - a.score).slice(0, 10);
                
                if (scores.length === 0) list.innerHTML = "<center>Chưa có kỷ lục nào.</center>";
                else list.innerHTML = scores.map((s, i) => `
                    <div class="score-item">
                        <span>${i === 0 ? '👑' : i+1 + '.'} ${s.name}</span> 
                        <span>${s.score}</span>
                    </div>`).join('');
            } catch (e) { list.innerHTML = "Lỗi kết nối GitHub."; }
        }

        // --- THUẬT TOÁN PIKACHU ---
        function checkConnect(p1, p2, maxR, maxC) {
            const isEmpty = (r, c) => (r >= -1 && r <= maxR && c >= -1 && c <= maxC && board[r][c] === -1);
            const checkLine = (v1, v2, fixed, isRow) => {
                for (let i = Math.min(v1, v2) + 1; i < Math.max(v1, v2); i++)
                    if (isRow ? !isEmpty(fixed, i) : !isEmpty(i, fixed)) return false;
                return true;
            };
            if (p1.r === p2.r && checkLine(p1.c, p2.c, p1.r, true)) return true;
            if (p1.c === p2.c && checkLine(p1.r, p2.r, p1.c, false)) return true;
            if (isEmpty(p1.r, p2.c) && checkLine(p1.c, p2.c, p1.r, true) && checkLine(p1.r, p2.r, p2.c, false)) return true;
            if (isEmpty(p2.r, p1.c) && checkLine(p1.r, p2.r, p1.c, false) && checkLine(p1.c, p2.c, p2.r, true)) return true;
            for (let r = -1; r <= maxR; r++)
                if (isEmpty(r, p1.c) && checkLine(p1.r, r, p1.c, false) && isEmpty(r, p2.c) && checkLine(p1.c, p2.c, r, true) && checkLine(r, p2.r, p2.c, false)) return true;
            for (let c = -1; c <= maxC; c++)
                if (isEmpty(p1.r, c) && checkLine(p1.c, c, p1.r, true) && isEmpty(p2.r, c) && checkLine(p1.r, p2.r, c, false) && checkLine(c, p2.c, p2.r, true)) return true;
            return false;
        }

        function manualShuffle(isAuto = false) {
            if (!isAuto && shuffleCount <= 0) return;
            const level = levels[currentLevelIdx];
            let imgs = [];
            for (let r = 0; r < level.rows; r++) 
                for (let c = 0; c < level.cols; c++) 
                    if (board[r][c] !== -1) imgs.push(board[r][c]);
            
            imgs.sort(() => Math.random() - 0.5);
            let idx = 0;
            for (let r = 0; r < level.rows; r++) 
                for (let c = 0; c < level.cols; c++) 
                    if (board[r][c] !== -1) {
                        board[r][c] = imgs[idx++];
                        document.getElementById(`tile-${r}-${c}`).style.backgroundImage = `url('${childImages[board[r][c]]}')`;
                    }
            if(!isAuto) { shuffleCount--; updateShuffleButton(); }
            checkBoardStatus();
        }

        function updateShuffleButton() {
            const btn = document.getElementById('btn-shuffle');
            btn.innerText = `ĐỔI VỊ TRÍ (${shuffleCount < 0 ? 0 : shuffleCount})`;
            btn.style.opacity = shuffleCount <= 0 ? "0.5" : "1";
        }

        function checkBoardStatus() {
            const level = levels[currentLevelIdx];
            let hasMove = false; let active = [];
            for (let r = 0; r < level.rows; r++) 
                for (let c = 0; c < level.cols; c++) 
                    if (board[r][c] !== -1) active.push({ r, c, idx: board[r][c] });
            
            for (let i = 0; i < active.length; i++) {
                for (let j = i + 1; j < active.length; j++) {
                    if (active[i].idx === active[j].idx && checkConnect(active[i], active[j], level.rows, level.cols)) {
                        hasMove = true; break;
                    }
                }
                if (hasMove) break;
            }
            if (!hasMove && matchedCount < level.rows * level.cols) {
                if (shuffleCount > 0) {
                    alert("Không còn nước đi! Tự động đổi vị trí.");
                    manualShuffle(true);
                } else {
                    alert("Hết nước đi và hết lượt đổi! Game Reset.");
                    initLevel();
                }
            }
        }

        // --- TIỆN ÍCH KHÁC ---
        function createButterfly() {
            if (!isButterflyActive) return;
            const b = document.createElement('div'); b.className = 'butterfly';
            b.innerHTML = '🦋'; b.style.fontSize = (Math.random() * 10 + 20) + 'px';
            b.style.setProperty('--t', Math.random() * 80 + 10 + 'vh');
            b.style.setProperty('--et', Math.random() * 80 + 10 + 'vh');
            b.style.animation = 'fly-right ' + (Math.random()*5+8) + 's linear forwards';
            document.getElementById('butterfly-container').appendChild(b);
            setTimeout(() => b.remove(), 14000);
        }

        function toggleButterflies() { 
            isButterflyActive = !isButterflyActive; 
            event.target.innerText = isButterflyActive ? "🦋 Bướm: Bật" : "🦋 Bướm: Tắt";
            if(!isButterflyActive) document.getElementById('butterfly-container').innerHTML = ''; 
        }

        function toggleMusic() { 
            const m = document.getElementById('bg-music'); 
            const btn = document.getElementById('btn-music');
            if (m.paused) { m.play().catch(e=>alert("Hãy tương tác với trang để phát nhạc")); btn.innerText = "🎵 Nhạc: Bật"; } 
            else { m.pause(); btn.innerText = "🎵 Nhạc: Tắt"; } 
        }
    </script>
</body>
</html>
