<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yên Lộc - Pikachu Legend 2026</title>
    <style>
        :root { --tile-w: 48px; --tile-h: 62px; --cols: 6; --rows: 4; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000 url('background.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; color: white; touch-action: manipulation;
        }

        /* Header gọn gàng */
        .header-controls {
            height: 70px; background: rgba(0,0,0,0.9);
            border-bottom: 2px solid #00f2fe;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 5px; z-index: 100; position: relative;
        }

        .stats-row { display: flex; gap: 15px; font-weight: bold; font-size: 0.9rem; color: #00f2fe; }

        .game-container {
            height: calc(100% - 70px); display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 10px; box-sizing: border-box;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(var(--cols), var(--tile-w));
            grid-template-rows: repeat(var(--rows), var(--tile-h));
            gap: 4px; padding: 10px; background: rgba(255, 255, 255, 0.1);
            border-radius: 12px; border: 1px solid rgba(0,242,254,0.4);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .tile { 
            width: var(--tile-w); height: var(--tile-h); 
            background-size: 100% 100%; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer; transition: transform 0.1s;
        }
        .tile.selected { border: 3px solid #fdfc47; box-shadow: 0 0 10px #fdfc47; transform: scale(1.05); z-index: 10; }
        .tile.matched { opacity: 0 !important; pointer-events: none; visibility: hidden; }

        .timer-bg { width: 200px; height: 8px; background: #222; border-radius: 10px; border: 1px solid #00f2fe; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #00f2fe; transition: width 1s linear; }

        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .btn-s { padding: 8px 15px; background: #222; border: 1px solid #00f2fe; color: white; border-radius: 6px; font-size: 12px; font-weight: bold; }

        /* MODAL (Màn hình chờ/Bảng điểm) */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 500; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid #00f2fe; text-align: center; width: 85%; max-width: 320px; }
        
        .input-name { 
            width: 90%; padding: 12px; margin: 20px 0; border-radius: 10px; border: none; 
            text-align: center; font-size: 1rem; font-weight: bold; background: #333; color: #fff;
        }
        .menu-btn { width: 100%; padding: 14px; background: #00f2fe; color: black; border: none; border-radius: 50px; font-weight: bold; margin-top: 12px; cursor: pointer; font-size: 1rem; }
        
        #score-list { text-align: left; margin: 15px 0; font-size: 0.9rem; max-height: 200px; overflow-y: auto; color: #ddd; }
        .score-item { padding: 5px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="start-screen" class="modal">
        <div class="modal-box">
            <h1 style="color:#00f2fe; margin:0;">YÊN LỘC</h1>
            <p style="font-size: 12px; color: #888;">LỘC VI TÍNH - PIKACHU 2026</p>
            <input type="text" id="p-name" class="input-name" placeholder="NHẬP TÊN BẠN..." maxlength="10">
            <button class="menu-btn" onclick="initGame()">BẮT ĐẦU CHƠI</button>
            <button class="menu-btn" style="background:none; color:#00f2fe; border:1px solid #00f2fe;" onclick="showLeaderboard()">BẢNG XẾP HẠNG</button>
        </div>
    </div>

    <div id="game-view" style="display:none;">
        <div class="header-controls">
            <div class="stats-row">
                <span>LV: <b id="lv">1</b></span>
                <span>ĐIỂM: <b id="sc">0</b></span>
                <span>TRỘN: <b id="sh-count">3</b></span>
            </div>
            <div class="timer-bg"><div id="timer-bar"></div></div>
        </div>

        <div class="game-container">
            <div id="game-board"></div>
            <div class="btn-row">
                <button class="btn-s" onclick="shuffleBtn()">TRỘN HÌNH</button>
                <button class="btn-s" onclick="location.reload()">TRANG CHỦ</button>
            </div>
        </div>
    </div>

    <div id="score-modal" class="modal" style="display:none;">
        <div class="modal-box">
            <h3 style="color:#fdfc47; margin-top:0;">🏆 CAO THỦ 🏆</h3>
            <div id="score-list"></div>
            <button class="menu-btn" onclick="document.getElementById('score-modal').style.display='none'">QUAY LẠI</button>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH GITHUB ---
        const G_TOKEN = 'ghp_' + '7VuzaHkjDkYFq9OOtcSmCGDsIjcXiX2SlH7W'; 
        const G_REPO = 'locvitinh-blip/chill'; 

        const levels = [
            { c: 6, r: 4, t: 120 }, // Màn 1: 6 cột, 4 hàng (vừa khít màn hình dọc)
            { c: 6, r: 6, t: 180 }, 
            { c: 6, r: 8, t: 240 }
        ];

        let curLv = 0, score = 0, playerName = "", timer, timeLeft, board = [], selected = [], matched = 0, shuffles = 3, isProcessing = false;
        const imgs = Array.from({length: 15}, (_, i) => `images/con${i+1}.jpg`);

        function initGame() {
            playerName = document.getElementById('p-name').value || "Yên Lộc";
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-view').style.display = 'flex';
            loadLevel();
        }

        function loadLevel() {
            clearInterval(timer);
            const lv = levels[curLv];
            document.getElementById('lv').innerText = curLv + 1;
            document.documentElement.style.setProperty('--cols', lv.c);
            document.documentElement.style.setProperty('--rows', lv.r);
            
            timeLeft = lv.t; updateBar();
            timer = setInterval(() => { 
                timeLeft--; updateBar(); 
                if(timeLeft <= 0) { alert("Hết giờ rồi!"); gameOver(); } 
            }, 1000);
            
            matched = 0; shuffles = 3; isProcessing = false;
            document.getElementById('sh-count').innerText = shuffles;
            generateBoard();
        }

        function generateBoard() {
            const lv = levels[curLv];
            let pairs = [];
            for(let i=0; i<(lv.c * lv.r)/2; i++) { pairs.push(i % imgs.length, i % imgs.length); }
            pairs.sort(() => Math.random() - 0.5);
            
            const container = document.getElementById('game-board');
            container.innerHTML = ''; board = [];
            for(let r=0; r<lv.r; r++) {
                board[r] = [];
                for(let c=0; c<lv.c; c++) {
                    const id = pairs.pop(); board[r][c] = id;
                    const tile = document.createElement('div');
                    tile.id = `t-${r}-${c}`; tile.className = 'tile';
                    tile.style.backgroundImage = `url('${imgs[id]}')`;
                    tile.onclick = () => clickTile(r, c);
                    container.appendChild(tile);
                }
            }
            setTimeout(checkDeadlock, 1000);
        }

        function clickTile(r, c) {
            if (isProcessing || board[r][c] === -1) return;
            const tileEl = document.getElementById(`t-${r}-${c}`);
            
            if (selected.length === 1 && selected[0].r === r && selected[0].c === c) {
                tileEl.classList.remove('selected'); selected = []; return;
            }

            tileEl.classList.add('selected');
            selected.push({r, c, id: board[r][c]});

            if(selected.length === 2) {
                isProcessing = true;
                const [a, b] = selected;
                if(a.id === b.id) {
                    document.getElementById(`t-${a.r}-${a.c}`).classList.add('matched');
                    document.getElementById(`t-${b.r}-${b.c}`).classList.add('matched');
                    setTimeout(() => {
                        board[a.r][a.c] = -1; board[b.r][b.c] = -1;
                        score += 100; document.getElementById('sc').innerText = score;
                        matched += 2;
                        if(matched === levels[curLv].c * levels[curLv].r) {
                            if(curLv < levels.length - 1) { curLv++; loadLevel(); }
                            else { winGame(); }
                        } else {
                            setTimeout(() => { checkDeadlock(); isProcessing = false; }, 300);
                        }
                    }, 200);
                } else {
                    setTimeout(() => {
                        document.getElementById(`t-${a.r}-${a.c}`).classList.remove('selected');
                        document.getElementById(`t-${b.r}-${b.c}`).classList.remove('selected');
                        isProcessing = false;
                    }, 300);
                }
                selected = [];
            }
        }

        function checkDeadlock() {
            let active = [];
            board.forEach(row => row.forEach(id => { if(id !== -1) active.push(id); }));
            if (active.length === 0) return;
            let counts = {};
            active.forEach(id => counts[id] = (counts[id] || 0) + 1);
            let hasPairs = false;
            for(let id in counts) { if(counts[id] >= 2) { hasPairs = true; break; } }
            if(!hasPairs) {
                if(shuffles > 0) { shuffleLogic(true); } else { gameOver(); }
            }
        }

        function shuffleLogic(auto) {
            let currentImgs = [];
            board.forEach(row => row.forEach(id => { if(id !== -1) currentImgs.push(id); }));
            currentImgs.sort(() => Math.random() - 0.5);
            board.forEach((row, r) => {
                row.forEach((id, c) => { if(board[r][c] !== -1) board[r][c] = currentImgs.pop(); });
            });
            if(!auto) { shuffles--; document.getElementById('sh-count').innerText = shuffles; }
            board.forEach((row, r) => {
                row.forEach((id, c) => {
                    const tile = document.getElementById(`t-${r}-${c}`);
                    if (id !== -1) tile.style.backgroundImage = `url('${imgs[id]}')`;
                });
            });
        }

        function shuffleBtn() { if(!isProcessing && shuffles > 0) shuffleLogic(false); }
        function updateBar() { document.getElementById('timer-bar').style.width = (timeLeft/levels[curLv].t)*100 + '%'; }
        
        function gameOver() { saveScore(); alert("GAME OVER! Điểm của bạn: " + score); location.reload(); }
        function winGame() { saveScore(); alert("CHIẾN THẮNG TUYỆT ĐỐI!"); location.reload(); }

        // LƯU ĐIỂM LÊN GITHUB
        async function saveScore() {
            try {
                await fetch(`https://api.github.com/repos/${G_REPO}/issues`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${G_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: `SCORE: ${score}`, body: `Player: ${playerName}` })
                });
            } catch(e) { console.error("Lỗi lưu điểm"); }
        }

        // XEM BẢNG XẾP HẠNG
        async function showLeaderboard() {
            const list = document.getElementById('score-list');
            document.getElementById('score-modal').style.display = 'flex';
            list.innerHTML = "Đang kết nối...";
            try {
                const res = await fetch(`https://api.github.com/repos/${G_REPO}/issues?state=all&per_page=10`);
                const data = await res.json();
                list.innerHTML = data.map(i => `<div class="score-item"><span>${i.body}</span> <b>${i.title.replace('SCORE: ', '')}đ</b></div>`).join('');
                if(data.length === 0) list.innerHTML = "Chưa có kỷ lục nào!";
            } catch(e) { list.innerHTML = "Lỗi tải bảng điểm!"; }
        }
    </script>
</body>
</html>
