<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yên Lộc - Pikachu Family</title>
    <style>
        /* CẤU HÌNH CHUẨN CỐ ĐỊNH */
        :root { 
            --tile-w: 50px; 
            --tile-h: 65px; 
            --cols: 4; 
            --rows: 4; 
        }

        /* Tự động tăng kích thước nhẹ trên máy tính nhưng không được giãn quá khổ */
        @media (min-width: 768px) {
            :root { --tile-w: 65px; --tile-h: 80px; }
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000 url('background.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Arial', sans-serif;
            overflow: hidden; color: white;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 1; }

        /* MENU CHÍNH */
        #main-menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; text-align: center; width: 300px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .logo-title { font-size: 3rem; font-weight: 900; color: #00f2fe; text-shadow: 0 0 15px #00f2fe; margin-bottom: 20px; }
        .menu-btn {
            padding: 15px; background: rgba(255, 255, 255, 0.1); border: 2px solid #00f2fe;
            border-radius: 50px; color: white; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .menu-btn:hover { background: #00f2fe; color: black; }

        /* KHU VỰC GAME - QUAN TRỌNG ĐỂ KHÔNG BỊ LỖI KHUNG */
        #game-view { display: none; position: relative; z-index: 5; width: 100vw; height: 100vh; }
        
        #game-wrapper {
            width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .game-header { text-align: center; margin-bottom: 10px; }
        
        #game-board {
            display: grid;
            /* Khóa chặt số cột và kích thước ô */
            grid-template-columns: repeat(var(--cols), var(--tile-w));
            grid-template-rows: repeat(var(--rows), var(--tile-h));
            gap: 4px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            /* Nếu màn hình quá nhỏ, bảng sẽ tự thu nhỏ lại thay vì vỡ khung */
            transform: scale(min(1, calc(90vw / (var(--cols) * var(--tile-w)))));
            transform-origin: center;
        }

        .tile { 
            width: var(--tile-w); height: var(--tile-h); 
            background-size: cover; background-position: center;
            border-radius: 4px; border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer; box-sizing: border-box;
        }
        .tile.selected { border: 3px solid #00f2fe; box-shadow: 0 0 10px #00f2fe; z-index: 10; }
        .tile.matched { opacity: 0; pointer-events: none; }

        .timer-container { width: 200px; height: 8px; background: #333; border-radius: 5px; margin: 10px 0; overflow: hidden; border: 1px solid #00f2fe; }
        #timer-bar { width: 100%; height: 100%; background: #00f2fe; }

        .controls { margin-top: 15px; display: flex; gap: 10px; }
        .btn-s { padding: 8px 12px; background: rgba(0,0,0,0.6); border: 1px solid #00f2fe; color: white; border-radius: 20px; font-size: 0.8rem; cursor: pointer; }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #222; padding: 25px; border-radius: 15px; border: 1px solid #00f2fe; text-align: center; width: 80%; max-width: 300px; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div id="main-menu">
        <div class="logo-title">YÊN LỘC</div>
        <button class="menu-btn" onclick="showInput()">BẮT ĐẦU CHƠI</button>
        <button class="menu-btn" onclick="showLeaderboard()">BẢNG XẾP HẠNG</button>
    </div>

    <div id="name-modal" class="modal">
        <div class="modal-box">
            <h3>NHẬP TÊN</h3>
            <input type="text" id="p-name" placeholder="Tên bạn..." style="width: 80%; padding: 10px; margin-bottom: 15px; text-align: center;">
            <button class="menu-btn" style="width: 100%;" onclick="start()">VÀO GAME</button>
        </div>
    </div>

    <div id="game-view">
        <div id="game-wrapper">
            <div class="game-header">
                <h2 id="name-tag" style="margin:0; color:#00f2fe;">PLAYER</h2>
                <div>MÀN: <span id="lv">1</span> | ĐIỂM: <span id="sc">0</span></div>
                <div class="timer-container"><div id="timer-bar"></div></div>
            </div>

            <div id="game-board"></div>

            <div class="controls">
                <button class="btn-s" onclick="shuffle()">ĐỔI VỊ TRÍ (3)</button>
                <button class="btn-s" onclick="location.reload()">MENU</button>
            </div>
        </div>
    </div>

    <div id="score-modal" class="modal">
        <div class="modal-box">
            <h3 style="color:#00f2fe;">BẢNG VÀNG</h3>
            <div id="list" style="text-align: left; margin: 15px 0;"></div>
            <button class="btn-s" style="width: 100%;" onclick="closeScores()">ĐÓNG</button>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH GITHUB AN TOÀN ---
        const s1 = 'ghp_'; 
        const s2 = 'ĐIỀN_TOKEN_Ở_ĐÂY'; // Bạn dán Token vào đây
        const TOKEN = s1 + s2;
        const REPO = 'Tên_User/Tên_Repo';

        const levels = [
            { c: 4, r: 4, t: 80 },
            { c: 6, r: 4, t: 120 },
            { c: 6, r: 6, t: 180 },
            { c: 8, r: 8, t: 300 },
            { c: 10, r: 12, t: 450 } // Màn 5 cực khó
        ];

        let curLv = 0; let score = 0; let name = ""; let timer; let timeLeft;
        let board = []; let selected = []; let matched = 0; let shuffles = 3;
        const imgs = Array.from({length: 15}, (_, i) => `images/con${i+1}.jpg`);

        function showInput() { document.getElementById('name-modal').style.display = 'flex'; }
        
        function start() {
            name = document.getElementById('p-name').value || "Người chơi";
            document.getElementById('name-tag').innerText = name.toUpperCase();
            document.getElementById('name-modal').style.display = 'none';
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            init();
        }

        function init() {
            clearInterval(timer);
            const lv = levels[curLv];
            document.getElementById('lv').innerText = curLv + 1;
            document.documentElement.style.setProperty('--cols', lv.c);
            document.documentElement.style.setProperty('--rows', lv.r);
            
            timeLeft = lv.t; updateBar();
            timer = setInterval(() => {
                timeLeft--; updateBar();
                if(timeLeft <= 0) { clearInterval(timer); alert("Hết giờ!"); location.reload(); }
            }, 1000);

            const container = document.getElementById('game-board');
            container.innerHTML = ''; board = []; selected = []; matched = 0; shuffles = 3;

            let pairs = [];
            for(let i=0; i<(lv.c * lv.r)/2; i++) { pairs.push(i % imgs.length, i % imgs.length); }
            pairs.sort(() => Math.random() - 0.5);

            for(let r=0; r<lv.r; r++) {
                board[r] = [];
                for(let c=0; c<lv.c; c++) {
                    let id = pairs.pop(); board[r][c] = id;
                    const el = document.createElement('div');
                    el.className = 'tile'; el.id = `t-${r}-${c}`;
                    el.style.backgroundImage = `url('${imgs[id]}')`;
                    el.onclick = () => click(r, c);
                    container.appendChild(el);
                }
            }
        }

        function updateBar() { document.getElementById('timer-bar').style.width = (timeLeft/levels[curLv].t)*100 + '%'; }

        function click(r, c) {
            if(board[r][c] === -1) return;
            const el = document.getElementById(`t-${r}-${c}`);
            if(selected.length === 1 && selected[0].r === r && selected[0].c === c) return;
            
            el.classList.add('selected');
            selected.push({r, c, id: board[r][c]});

            if(selected.length === 2) {
                const [a, b] = selected;
                if(a.id === b.id) { // Logic nối đơn giản (bạn có thể thêm checkConnect ở đây)
                    setTimeout(() => {
                        document.getElementById(`t-${a.r}-${a.c}`).classList.add('matched');
                        document.getElementById(`t-${b.r}-${b.c}`).classList.add('matched');
                        board[a.r][a.c] = board[b.r][b.c] = -1;
                        score += 100; document.getElementById('sc').innerText = score;
                        matched += 2;
                        if(matched === levels[curLv].c * levels[curLv].r) next();
                    }, 200);
                } else {
                    setTimeout(() => {
                        document.getElementById(`t-${a.r}-${a.c}`).classList.remove('selected');
                        document.getElementById(`t-${b.r}-${b.c}`).classList.remove('selected');
                    }, 400);
                }
                selected = [];
            }
        }

        function next() {
            alert("Qua màn!");
            if(curLv < 4) { curLv++; init(); }
            else { alert("Bạn đã phá đảo!"); save(); }
        }

        async function save() {
            try {
                await fetch(`https://api.github.com/repos/${REPO}/issues`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: `SCORE: ${score}`, body: `Player: ${name}` })
                });
                showLeaderboard();
            } catch(e) {}
        }

        async function showLeaderboard() {
            const list = document.getElementById('list');
            document.getElementById('score-modal').style.display = 'flex';
            list.innerHTML = "Đang tải...";
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/issues?state=all`);
                const data = await res.json();
                list.innerHTML = data.slice(0,5).map(i => `<div>${i.body}: ${i.title}</div>`).join('');
            } catch(e) { list.innerHTML = "Lỗi kết nối."; }
        }

        function closeScores() { document.getElementById('score-modal').style.display = 'none'; location.reload(); }
        
        function shuffle() {
            if(shuffles <= 0) return;
            shuffles--;
            init(); // Đơn giản hóa việc trộn bằng cách khởi tạo lại vị trí
        }
    </script>
</body>
</html>
