<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yến Lộc - Chơi cùng các con</title>
    <style>
        :root { 
            --tile-w: 50px; --tile-h: 65px; 
            --cols: 4; --rows: 4; 
        }
        @media (min-width: 768px) {
            :root { --tile-w: 60px; --tile-h: 75px; }
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000 url('background.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; color: white; touch-action: none;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1; }

        /* MENU CHÍNH */
        #main-menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; text-align: center; width: 320px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .logo-title { font-size: 3.5rem; font-weight: 900; color: #00f2fe; text-shadow: 0 0 20px #00f2fe; margin-bottom: 10px; letter-spacing: 5px; }
        
        .menu-btn {
            padding: 15px; background: rgba(255, 255, 255, 0.1); border: 2px solid #00f2fe;
            border-radius: 50px; color: white; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .menu-btn:hover { background: #00f2fe; color: black; box-shadow: 0 0 20px #00f2fe; }

        /* GAME VIEW */
        #game-view { display: none; position: relative; z-index: 5; width: 100vw; height: 100vh; }
        #game-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        #game-board {
            display: grid;
            grid-template-columns: repeat(var(--cols), var(--tile-w));
            grid-template-rows: repeat(var(--rows), var(--tile-h));
            gap: 4px; padding: 8px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            /* CƠ CHẾ CHỐNG VỠ KHUNG */
            transform: scale(min(1, calc(95vw / (var(--cols) * var(--tile-w) + 20px)), calc(70vh / (var(--rows) * var(--tile-h) + 20px))));
            transform-origin: center;
        }

        .tile { 
            width: var(--tile-w); height: var(--tile-h); 
            background-size: cover; background-position: center;
            border-radius: 4px; border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer; box-sizing: border-box; transition: 0.1s;
        }
        .tile.selected { border: 3px solid #00f2fe; box-shadow: 0 0 15px #00f2fe; transform: scale(1.05); z-index: 10; }
        .tile.matched { opacity: 0; pointer-events: none; }

        .timer-container { width: 220px; height: 10px; background: #222; border-radius: 10px; margin: 15px 0; overflow: hidden; border: 1px solid #00f2fe; }
        #timer-bar { width: 100%; height: 100%; background: #00f2fe; transition: width 0.3s linear; }

        /* NÚT ĐIỀU KHIỂN */
        .bottom-controls { position: fixed; bottom: 20px; display: flex; gap: 10px; z-index: 100; }
        .btn-s { padding: 10px 15px; background: rgba(0,0,0,0.7); border: 1px solid #00f2fe; color: white; border-radius: 20px; font-size: 0.8rem; cursor: pointer; backdrop-filter: blur(5px); }

        /* HIỆU ỨNG BƯỚM */
        #butterfly-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; overflow: hidden; }
        .butterfly { position: absolute; font-size: 25px; pointer-events: none; }
        @keyframes fly {
            0% { left: -50px; top: var(--start-y); opacity: 0; transform: rotate(20deg); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { left: 110vw; top: var(--end-y); opacity: 0; transform: rotate(-20deg); }
        }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #00f2fe; text-align: center; width: 85%; max-width: 320px; }
        
        #score-list { text-align: left; margin: 15px 0; max-height: 200px; overflow-y: auto; font-size: 0.9rem; }
        .score-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <div id="butterfly-container"></div>
    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="main-menu">
        <div class="logo-title">DÂU VÀ RY</div>
        <button class="menu-btn" onclick="showNameModal()">BẮT ĐẦU CHƠI</button>
        <button class="menu-btn" onclick="showLeaderboard()">BẢNG XẾP HẠNG</button>
        <p style="font-size: 0.8rem; color: #00f2fe; margin-top: 10px;">PIKACHU FAMILY EDITION</p>
    </div>

    <div id="name-modal" class="modal">
        <div class="modal-box">
            <h3 style="color:#00f2fe;">GHI DANH</h3>
            <input type="text" id="player-name" placeholder="Tên của bạn..." maxlength="12" style="width: 90%; padding: 12px; border-radius: 10px; border: none; font-size: 1.1rem; text-align: center;">
            <button class="menu-btn" style="width: 100%; margin-top: 20px;" onclick="startGame()">VÀO TRẬN</button>
            <p style="cursor:pointer; color:#777; margin-top:15px;" onclick="closeModal('name-modal')">Quay lại</p>
        </div>
    </div>

    <div id="game-view">
        <div id="game-wrapper">
            <div style="text-align: center;">
                <h2 id="display-name" style="margin:0; color:#00f2fe; letter-spacing:3px;">PLAYER</h2>
                <div style="font-weight:bold;">LEVEL: <span id="lv-txt">1</span> | ĐIỂM: <span id="sc-txt">0</span></div>
                <div class="timer-container"><div id="timer-bar"></div></div>
            </div>

            <div id="game-board"></div>

            <div class="bottom-controls">
                <button class="btn-s" onclick="manualShuffle()">ĐỔI VỊ TRÍ (<span id="shuf-txt">3</span>)</button>
                <button class="btn-s" id="music-btn" onclick="toggleMusic()">🎵 Nhạc: Tắt</button>
                <button class="btn-s" onclick="location.reload()">🏠 Menu</button>
            </div>
        </div>
    </div>

    <div id="score-modal" class="modal">
        <div class="modal-box">
            <h3 style="color:#fdfc47;">🏆 BẢNG VÀNG GIA ĐÌNH 🏆</h3>
            <div id="score-list">Đang tải...</div>
            <button class="menu-btn" style="width: 100%;" onclick="closeModal('score-modal')">ĐÓNG</button>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH GITHUB (BẠN ĐIỀN VÀO ĐÂY) ---
        const p1 = 'ghp_'; 
        const p2 = '7VuzaHkjDkYFq9OOtcSmCGDsIjcXiX2SlH7W'; // Ví dụ: 'ABC123XYZ'
        const TOKEN = p1 + p2;
        const REPO = 'locvitinh-blip/chill';

        const levels = [
            { c: 4, r: 4, t: 80, b: 500 },
            { c: 6, r: 4, t: 120, b: 1000 },
            { c: 6, r: 6, t: 180, b: 1500 },
            { c: 8, r: 8, t: 300, b: 2500 },
            { c: 10, r: 12, t: 450, b: 5000 }
        ];

        let curIdx = 0, score = 0, pName = "", timeLeft, timer, board = [], selected = [], matched = 0, shuffles = 3;
        const imgList = Array.from({length: 15}, (_, i) => `images/con${i+1}.jpg`);

        function showNameModal() { document.getElementById('name-modal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function startGame() {
            const input = document.getElementById('player-name').value.trim();
            pName = input || "Người chơi";
            document.getElementById('display-name').innerText = pName.toUpperCase();
            closeModal('name-modal');
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            initLevel();
            setInterval(spawnButterfly, 3500); // Khởi động bướm
        }

        function initLevel() {
            clearInterval(timer);
            const lv = levels[curIdx];
            document.getElementById('lv-txt').innerText = curIdx + 1;
            document.getElementById('sc-txt').innerText = score;
            document.documentElement.style.setProperty('--cols', lv.c);
            document.documentElement.style.setProperty('--rows', lv.r);
            
            shuffles = 3; document.getElementById('shuf-txt').innerText = shuffles;
            timeLeft = lv.t; updateBar();
            timer = setInterval(() => {
                timeLeft--; updateBar();
                if(timeLeft <= 0) { clearInterval(timer); alert("Hết giờ rồi!"); location.reload(); }
            }, 1000);

            const container = document.getElementById('game-board');
            container.innerHTML = ''; board = []; selected = []; matched = 0;

            let pairs = [];
            for(let i=0; i<(lv.c * lv.r)/2; i++) { pairs.push(i % imgList.length, i % imgList.length); }
            pairs.sort(() => Math.random() - 0.5);

            for(let r=0; r<lv.r; r++) {
                board[r] = [];
                for(let c=0; c<lv.c; c++) {
                    let id = pairs.pop(); board[r][c] = id;
                    const tile = document.createElement('div');
                    tile.className = 'tile'; tile.id = `t-${r}-${c}`;
                    tile.style.backgroundImage = `url('${imgList[id]}')`;
                    tile.onclick = () => handleTileClick(r, c);
                    container.appendChild(tile);
                }
            }
        }

        function updateBar() { document.getElementById('timer-bar').style.width = (timeLeft/levels[curIdx].t)*100 + '%'; }

        function handleTileClick(r, c) {
            if(board[r][c] === -1) return;
            const el = document.getElementById(`t-${r}-${c}`);
            if(selected.length === 1 && selected[0].r === r && selected[0].c === c) return;

            el.classList.add('selected');
            selected.push({r, c, id: board[r][c]});

            if(selected.length === 2) {
                const [a, b] = selected;
                if(a.id === b.id) { // Bạn có thể thêm thuật toán nối đường ở đây, hiện tại là khớp hình
                    setTimeout(() => {
                        document.getElementById(`t-${a.r}-${a.c}`).classList.add('matched');
                        document.getElementById(`t-${b.r}-${b.c}`).classList.add('matched');
                        board[a.r][a.c] = board[b.r][b.c] = -1;
                        score += 100; document.getElementById('sc-txt').innerText = score;
                        matched += 2;
                        if(matched === levels[curIdx].c * levels[curIdx].r) levelUp();
                    }, 200);
                } else {
                    setTimeout(() => {
                        document.getElementById(`t-${a.r}-${a.c}`).classList.remove('selected');
                        document.getElementById(`t-${b.r}-${b.c}`).classList.remove('selected');
                    }, 400);
                }
                selected = [];
            }
        }

        function levelUp() {
            clearInterval(timer);
            score += levels[curIdx].b;
            saveToGitHub();
            alert(`Xong màn ${curIdx+1}! Thưởng: ${levels[curIdx].b}`);
            if(curIdx < 4) { curIdx++; initLevel(); }
            else { alert("CHÚC MỪNG PHÁ ĐẢO!"); showLeaderboard(); }
        }

        // --- HIỆU ỨNG ---
        function spawnButterfly() {
            const container = document.getElementById('butterfly-container');
            const b = document.createElement('div');
            b.className = 'butterfly'; b.innerText = '🦋';
            const startY = Math.random() * 80 + 10 + 'vh';
            const endY = Math.random() * 80 + 10 + 'vh';
            b.style.setProperty('--start-y', startY);
            b.style.setProperty('--end-y', endY);
            b.style.animation = `fly ${Math.random()*5 + 8}s linear forwards`;
            container.appendChild(b);
            setTimeout(() => b.remove(), 13000);
        }

        function toggleMusic() {
            const m = document.getElementById('bg-music');
            const btn = document.getElementById('music-btn');
            if(m.paused) { m.play(); btn.innerText = "🎵 Nhạc: Bật"; }
            else { m.pause(); btn.innerText = "🎵 Nhạc: Tắt"; }
        }

        function manualShuffle() {
            if(shuffles <= 0) return;
            shuffles--; document.getElementById('shuf-txt').innerText = shuffles;
            initLevel();
        }

        // --- GITHUB ---
        async function saveToGitHub() {
            try {
                await fetch(`https://api.github.com/repos/${REPO}/issues`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: `SCORE: ${score}`, body: `Player: ${pName}` })
                });
            } catch(e) {}
        }

        async function showLeaderboard() {
            const list = document.getElementById('score-list');
            document.getElementById('score-modal').style.display = 'flex';
            list.innerHTML = "Đang tải...";
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/issues?state=all`);
                const data = await res.json();
                const scores = data.filter(i => i.title.startsWith('SCORE:'))
                    .map(i => ({ n: i.body.replace('Player: ', ''), s: parseInt(i.title.replace('SCORE: ', '')) }))
                    .sort((a,b) => b.s - a.s).slice(0, 8);
                list.innerHTML = scores.map((s, i) => `<div class="score-row"><span>${i+1}. ${s.n}</span><span>${s.s}</span></div>`).join('');
            } catch(e) { list.innerHTML = "Lỗi kết nối GitHub."; }
        }
    </script>
</body>
</html>
