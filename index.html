<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yến Lộc - Chơi cùng các con</title>
    <style>
        :root { --tile-w: 14vw; --tile-h: 7.5vh; --cols: 4; --rows: 5; }
        @media (min-width: 600px) { :root { --tile-w: 60px; --tile-h: 75px; } }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: #000 url('background.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; touch-action: none;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.3); z-index: 1; }
        
        #game-container {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            z-index: 5; display: flex; flex-direction: column; align-items: center; width: 100%;
        }

        .timer-container {
            width: 80%; height: 10px; background: rgba(255,255,255,0.2);
            border-radius: 10px; margin: 10px 0; overflow: hidden; border: 1px solid rgba(255,255,255,0.3);
        }
        #timer-bar { width: 100%; height: 100%; background: #00f2fe; transition: width 0.5s linear; }

        #game-board {
            display: grid; grid-template-columns: repeat(var(--cols), var(--tile-w));
            grid-template-rows: repeat(var(--rows), var(--tile-h));
            gap: 3px; padding: 5px; background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px;
        }

        .tile {
            width: var(--tile-w); height: var(--tile-h);
            background-size: cover; background-position: center;
            border-radius: 4px; cursor: pointer; border: 1.5px solid transparent;
        }
        .tile.selected { border-color: #00f2fe; box-shadow: 0 0 10px #00f2fe; transform: scale(1.05); z-index: 2; }
        .tile.wrong { border-color: #ff4b2b !important; animation: shake 0.3s; }
        .tile.matched { opacity: 0; visibility: hidden; pointer-events: none; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .game-header { color: white; text-align: center; text-shadow: 2px 2px 5px #000; }
        .stats-bar { display: flex; gap: 15px; color: #fff; font-weight: bold; font-size: 0.85rem; justify-content: center; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: white; backdrop-filter: blur(10px);
        }
        .modal-content {
            background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px;
            width: 85%; max-width: 320px; text-align: center; border: 1px solid #00f2fe;
        }
        
        #leaderboard-list { text-align: left; width: 100%; margin: 10px 0; max-height: 200px; overflow-y: auto; font-size: 0.9rem; }
        .score-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .syncing { font-style: italic; color: #aaa; font-size: 0.7rem; }

        #butterfly-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .butterfly { position: absolute; width: 25px; height: 25px; }
        @keyframes fly-right { 0% { left: -50px; top: var(--t); } 100% { left: 110vw; top: var(--et); } }
        
        .btn-chill { padding: 7px 12px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); border-radius: 20px; color: white; cursor: pointer; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="name-modal" class="modal" style="display: flex;">
        <div class="modal-content">
            <h2 style="color:#00f2fe">DÂU VÀ RY</h2>
            <input type="text" id="player-name" placeholder="Tên nghệ danh..." style="padding:10px; width:80%; text-align:center; border-radius:5px; border:none; margin-bottom:15px;">
            <button class="btn-chill" onclick="startGame()" style="background:#00f2fe; color:black; font-weight:bold; width:100%">BẮT ĐẦU</button>
        </div>
    </div>

    <div id="score-modal" class="modal">
        <div class="modal-content">
            <h3>🏆 BẢNG VÀNG TOÀN CẦU 🏆</h3>
            <div id="leaderboard-list">Đang tải điểm từ GitHub...</div>
            <button class="btn-chill" onclick="closeScores()" style="width:100%">ĐÓNG</button>
        </div>
    </div>

    <div class="overlay"></div>
    <div id="game-container">
        <div class="game-header">
            <h1 id="display-name">YÊN LỘC</h1>
            <div class="stats-bar">
                <span>MÀN: <span id="lv-num">1</span></span>
                <span>ĐIỂM: <span id="score-num">0</span></span>
            </div>
        </div>
        <div class="timer-container"><div id="timer-bar"></div></div>
        <div id="game-board"></div>
        <div id="sync-status" class="syncing" style="margin-top:5px; color: #00f2fe;"></div>
    </div>
    <div id="butterfly-container"></div>

    <div class="controls-wrapper" style="position:fixed; bottom:15px; width:100%; display:flex; justify-content:center; gap:10px; z-index:100;">
        <button class="btn-chill" onclick="showLeaderboard()">🏆 Bảng Điểm</button>
        <button class="btn-chill" onclick="initLevel()">Chơi Lại</button>
    </div>

    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <script>
        // --- CẤU HÌNH GITHUB CỦA BẠN ---
        const p1 = 'ghp_'; // Phần đầu cố định của GitHub
        const p2 = '7VuzaHkjDkYFq9OOtcSmCGDsIjcXiX2SlH7W'; // Phần còn lại của Token bạn copy
        const GITHUB_TOKEN = p1 + p2; // Cộng lại để dùng
        const REPO = 'locvitinh-blip/chill'; // Thay tên user/tên repo vào đây (Vd: yenloc/pikachu)
        // ------------------------------

        const levels = [
            { cols: 4, rows: 4, time: 60,  bonus: 500 },
            { cols: 4, rows: 6, time: 100, bonus: 1000 },
            { cols: 6, rows: 6, time: 150, bonus: 1500 }
        ];

        let playerName = "Vô danh"; let score = 0; let currentLevelIdx = 0;
        let timeLeft = 0; let timerInterval; let childImages = Array.from({length: 15}, (_, i) => `images/con${i+1}.jpg`);
        let board = []; let selectedTiles = []; let matchedCount = 0;

        function startGame() {
            const input = document.getElementById('player-name').value.trim();
            if (input) playerName = input;
            document.getElementById('display-name').innerText = playerName.toUpperCase();
            document.getElementById('name-modal').style.display = 'none';
            initLevel();
            setInterval(createButterfly, 4000);
        }

        function initLevel() {
            clearInterval(timerInterval);
            const level = levels[currentLevelIdx];
            document.getElementById('lv-num').innerText = currentLevelIdx + 1;
            document.getElementById('score-num').innerText = score;
            timeLeft = level.time; updateTimerBar(); startTimer();
            
            document.documentElement.style.setProperty('--cols', level.cols);
            document.documentElement.style.setProperty('--rows', level.rows);
            const gameBoard = document.getElementById('game-board');
            gameBoard.innerHTML = ''; board = []; selectedTiles = []; matchedCount = 0;
            
            let tileList = [];
            for (let i = 0; i < (level.cols * level.rows) / 2; i++) {
                let imgIdx = i % childImages.length;
                tileList.push(imgIdx, imgIdx);
            }
            tileList.sort(() => Math.random() - 0.5);

            for (let r = -1; r <= level.rows; r++) {
                board[r] = [];
                for (let c = -1; c <= level.cols; c++) {
                    if (r === -1 || r === level.rows || c === -1 || c === level.cols) board[r][c] = -1;
                    else {
                        let imgIdx = tileList.pop(); board[r][c] = imgIdx;
                        const tile = document.createElement('div');
                        tile.className = 'tile'; tile.id = `tile-${r}-${c}`;
                        tile.style.backgroundImage = `url('${childImages[imgIdx]}')`;
                        tile.onclick = () => handleTileClick(r, c);
                        gameBoard.appendChild(tile);
                    }
                }
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--; updateTimerBar();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    saveScoreToGitHub(); // LƯU ĐIỂM NGAY KHI HẾT GIỜ
                    alert("HẾT GIỜ! Điểm đã được gửi lên Bảng Vàng.");
                    initLevel();
                }
            }, 1000);
        }

        function updateTimerBar() {
            document.getElementById('timer-bar').style.width = (timeLeft / levels[currentLevelIdx].time) * 100 + "%";
        }

        function handleTileClick(r, c) {
            if (board[r][c] === -1) return;
            const tile = document.getElementById(`tile-${r}-${c}`);
            tile.classList.add('selected');
            selectedTiles.push({ r, c, idx: board[r][c] });

            if (selectedTiles.length === 2) {
                const [t1, t2] = selectedTiles;
                if (t1.r === t2.r && t1.c === t2.c) { tile.classList.remove('selected'); selectedTiles = []; return; }

                if (t1.idx === t2.idx) { // Chỗ này bạn có thể thêm hàm checkConnect vào nếu muốn
                    board[t1.r][t1.c] = board[t2.r][t2.c] = -1;
                    document.getElementById(`tile-${t1.r}-${t1.c}`).classList.add('matched');
                    document.getElementById(`tile-${t2.r}-${t2.c}`).classList.add('matched');
                    score += 100; matchedCount += 2;
                    document.getElementById('score-num').innerText = score;
                    if (matchedCount === levels[currentLevelIdx].cols * levels[currentLevelIdx].rows) {
                        clearInterval(timerInterval);
                        score += (timeLeft * 50);
                        saveScoreToGitHub(); // LƯU ĐIỂM KHI THẮNG MÀN
                        alert("Thắng màn! Điểm đã được lưu.");
                        if(currentLevelIdx < levels.length - 1) { currentLevelIdx++; initLevel(); }
                    }
                } else {
                    document.getElementById(`tile-${t1.r}-${t1.c}`).classList.add('wrong');
                    document.getElementById(`tile-${t2.r}-${t2.c}`).classList.add('wrong');
                    score = Math.max(0, score - 50);
                    timeLeft = Math.max(0, timeLeft - 3);
                    setTimeout(() => {
                        document.getElementById(`tile-${t1.r}-${t1.c}`).classList.remove('selected', 'wrong');
                        document.getElementById(`tile-${t2.r}-${t2.c}`).classList.remove('selected', 'wrong');
                    }, 400);
                }
                selectedTiles = [];
            }
        }

        // --- HÀM LƯU ĐIỂM LÊN GITHUB ISSUES ---
        async function saveScoreToGitHub() {
            document.getElementById('sync-status').innerText = "🔄 Đang đồng bộ điểm lên GitHub...";
            const bodyData = { title: `SCORE: ${score}`, body: `Player: ${playerName} | Date: ${new Date().toLocaleString()}` };
            
            try {
                await fetch(`https://api.github.com/repos/${REPO}/issues`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                document.getElementById('sync-status').innerText = "✅ Đã lưu điểm công khai!";
                setTimeout(() => document.getElementById('sync-status').innerText = "", 3000);
            } catch (e) {
                document.getElementById('sync-status').innerText = "❌ Lỗi lưu GitHub.";
            }
        }

        async function showLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            document.getElementById('score-modal').style.display = 'flex';
            list.innerHTML = "Đang tải bảng vàng...";

            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/issues?state=all&per_page=100`);
                const issues = await res.json();
                let allScores = issues
                    .filter(i => i.title.startsWith('SCORE:'))
                    .map(i => ({
                        name: i.body.split('|')[0].replace('Player: ', '').trim(),
                        score: parseInt(i.title.replace('SCORE: ', ''))
                    }))
                    .sort((a, b) => b.score - a.score)
                    .slice(0, 10);

                list.innerHTML = allScores.map((s, i) => 
                    `<div class="score-item"><span>${i+1}. ${s.name}</span> <span>${s.score}</span></div>`
                ).join('');
            } catch (e) {
                list.innerHTML = "Không thể tải bảng điểm.";
            }
        }

        function closeScores() { document.getElementById('score-modal').style.display = 'none'; }
        function createButterfly() {
            const b = document.createElement('div'); b.className = 'butterfly';
            b.innerHTML = '🦋'; b.style.fontSize = '20px';
            b.style.setProperty('--t', Math.random() * 80 + 10 + 'vh');
            b.style.setProperty('--et', Math.random() * 80 + 10 + 'vh');
            b.style.animation = 'fly-right ' + (Math.random()*5+8) + 's linear forwards';
            document.getElementById('butterfly-container').appendChild(b);
            setTimeout(() => b.remove(), 14000);
        }
    </script>
</body>
</html>
