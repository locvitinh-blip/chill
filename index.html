<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yên Lộc - Cùng Con Chơi Đùa</title>
    <style>
        /* --- CSS GIAO DIỆN CHILL --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: #000 url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.2); z-index: 1; }
        
        #game-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 5; display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        /* Bàn cờ với hiệu ứng kính mờ */
        #game-board {
            display: grid;
            grid-template-columns: repeat(10, 60px);
            grid-template-rows: repeat(8, 70px);
            gap: 4px; padding: 10px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .tile {
            width: 60px; height: 70px;
            background-size: cover; background-position: center;
            border-radius: 6px; cursor: pointer;
            transition: all 0.2s; border: 2px solid transparent;
        }
        .tile:hover { transform: scale(1.05); box-shadow: 0 0 10px #fff; }
        .tile.selected { border-color: #00f2fe; box-shadow: 0 0 15px #00f2fe; transform: scale(1.1); z-index: 2; }
        .tile.matched { opacity: 0; visibility: hidden; pointer-events: none; }

        .game-header { color: white; text-align: center; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
        h1 { font-weight: 300; font-size: 2.2rem; letter-spacing: 4px; margin: 0; }
        
        .btn-chill {
            padding: 10px 30px; background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 30px;
            color: white; cursor: pointer; backdrop-filter: blur(5px);
            transition: 0.3s; font-size: 0.9rem; text-transform: uppercase;
        }
        .btn-chill:hover { background: rgba(255, 255, 255, 0.4); letter-spacing: 1px; }

        /* --- HIỆU ỨNG BƯỚM & NHẠC --- */
        #butterfly-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .butterfly { position: absolute; opacity: 0; }
        @keyframes fly-right { 0% { left: -10%; top: var(--start-top); opacity: 0; transform: scale(var(--size)); } 10% { opacity: 1; } 90% { opacity: 1; } 100% { left: 110%; top: var(--end-top); opacity: 0; transform: scale(var(--size)); } }
        @keyframes fly-up { 0% { bottom: -10%; left: var(--start-left); opacity: 0; transform: scale(var(--size)); } 10% { opacity: 1; } 90% { opacity: 1; } 100% { bottom: 110%; left: var(--end-left); opacity: 0; transform: scale(var(--size)); } }
        .music-control { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div id="game-container">
        <div class="game-header">
            <h1>YÊN LỘC</h1>
            <p>Góc nhỏ bình yên của gia đình</p>
        </div>
        <div id="game-board"></div>
        <button class="btn-chill" onclick="resetGame()">Chơi Ván Mới</button>
    </div>

    <div id="butterfly-container"></div>
    <div class="music-control">
        <button class="btn-chill" onclick="toggleMusic()">
            <span id="music-icon">🎵</span> <span id="music-text">Bật Nhạc</span>
        </button>
    </div>
    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <script>
        const ROWS = 8; 
        const COLS = 10; 
        const childImages = [
            'images/con1.jpg', 'images/con2.jpg', 'images/con3.jpg', 'images/con4.jpg',
            'images/con5.jpg', 'images/con6.jpg', 'images/con7.jpg', 'images/con8.jpg',
            'images/con9.jpg', 'images/con10.jpg', 'images/con11.jpg', 'images/con12.jpg', 'images/con13.jpg', 'images/con14.jpg', 'images/con15.jpg'
        ];

        let board = []; 
        let selectedTiles = [];
        let matchedCount = 0;

        // KHỞI TẠO MA TRẬN VỚI LỚP ĐỆM TRỐNG (Padding)
        function initGame() {
            const gameBoard = document.getElementById('game-board');
            gameBoard.innerHTML = '';
            board = [];
            selectedTiles = [];
            matchedCount = 0;

            let tileList = [];
            let totalTiles = ROWS * COLS;
            for (let i = 0; i < totalTiles / 2; i++) {
                let imgIdx = i % childImages.length;
                tileList.push(imgIdx, imgIdx);
            }
            tileList.sort(() => Math.random() - 0.5);

            // Tạo ma trận lớn hơn (ROWS+2 x COLS+2) để có đường đi bên ngoài
            for (let r = -1; r <= ROWS; r++) {
                board[r] = [];
                for (let c = -1; c <= COLS; c++) {
                    if (r === -1 || r === ROWS || c === -1 || c === COLS) {
                        board[r][c] = -1; // Ô trống ở viền ngoài cùng
                    } else {
                        let imgIndex = tileList.pop();
                        board[r][c] = imgIndex;

                        const tileDiv = document.createElement('div');
                        tileDiv.className = 'tile';
                        tileDiv.id = `tile-${r}-${c}`;
                        tileDiv.style.backgroundImage = `url('${childImages[imgIndex]}')`;
                        tileDiv.onclick = () => handleTileClick(r, c);
                        gameBoard.appendChild(tileDiv);
                    }
                }
            }
        }

        function handleTileClick(r, c) {
            if (board[r][c] === -1) return;
            const clickedTile = document.getElementById(`tile-${r}-${c}`);

            if (selectedTiles.length === 1 && selectedTiles[0].r === r && selectedTiles[0].c === c) {
                clickedTile.classList.remove('selected');
                selectedTiles = [];
                return;
            }

            clickedTile.classList.add('selected');
            selectedTiles.push({ r, c, imgIndex: board[r][c] });

            if (selectedTiles.length === 2) {
                const t1 = selectedTiles[0];
                const t2 = selectedTiles[1];

                if (t1.imgIndex === t2.imgIndex && checkConnect(t1, t2)) {
                    setTimeout(() => {
                        document.getElementById(`tile-${t1.r}-${t1.c}`).classList.add('matched');
                        document.getElementById(`tile-${t2.r}-${t2.c}`).classList.add('matched');
                        board[t1.r][t1.c] = -1;
                        board[t2.r][t2.c] = -1;
                        matchedCount += 2;
                        if (matchedCount === ROWS * COLS) alert("Cảm ơn bạn đã ghé thăm Yên Lộc!");
                    }, 250);
                } else {
                    setTimeout(() => {
                        document.getElementById(`tile-${t1.r}-${t1.c}`).classList.remove('selected');
                        document.getElementById(`tile-${t2.r}-${t2.c}`).classList.remove('selected');
                    }, 400);
                }
                selectedTiles = [];
            }
        }

        // THUẬT TOÁN KIỂM TRA ĐƯỜNG ĐI (Đã hỗ trợ đi xuyên qua lớp đệm ngoài)
        function checkConnect(p1, p2) {
            const isEmpty = (r, c) => (r >= -1 && r <= ROWS && c >= -1 && c <= COLS && board[r][c] === -1);

            const checkLine = (v1, v2, fixed, isRow) => {
                let start = Math.min(v1, v2) + 1;
                let end = Math.max(v1, v2);
                for (let i = start; i < end; i++) {
                    if (isRow && !isEmpty(fixed, i)) return false;
                    if (!isRow && !isEmpty(i, fixed)) return false;
                }
                return true;
            };

            // 1. Nối thẳng (0 khúc cua)
            if (p1.r === p2.r && checkLine(p1.c, p2.c, p1.r, true)) return true;
            if (p1.c === p2.c && checkLine(p1.r, p2.r, p1.c, false)) return true;

            // 2. Nối 1 khúc cua (chữ L)
            if (isEmpty(p1.r, p2.c) && checkLine(p1.c, p2.c, p1.r, true) && checkLine(p1.r, p2.r, p2.c, false)) return true;
            if (isEmpty(p2.r, p1.c) && checkLine(p1.r, p2.r, p1.c, false) && checkLine(p1.c, p2.c, p2.r, true)) return true;

            // 3. Nối 2 khúc cua (Dò tìm đường đi qua các ô trống lân cận)
            for (let r = -1; r <= ROWS; r++) {
                if (isEmpty(r, p1.c) && checkLine(p1.r, r, p1.c, false)) {
                    if (isEmpty(r, p2.c) && checkLine(p1.c, p2.c, r, true) && checkLine(r, p2.r, p2.c, false)) return true;
                }
            }
            for (let c = -1; c <= COLS; c++) {
                if (isEmpty(p1.r, c) && checkLine(p1.c, c, p1.r, true)) {
                    if (isEmpty(p2.r, c) && checkLine(p1.r, p2.r, c, false) && checkLine(c, p2.c, p2.r, true)) return true;
                }
            }
            return false;
        }

        function resetGame() { initGame(); }

        // HIỆU ỨNG BƯỚM & NHẠC (Giữ nguyên)
        function createButterfly() {
            const container = document.getElementById('butterfly-container');
            const img = document.createElement('img');
            img.src = 'butterfly.gif'; img.className = 'butterfly';
            const size = Math.random() * 0.4 + 0.5; img.style.setProperty('--size', size);
            img.style.setProperty('--start-top', Math.random() * 80 + 10 + '%');
            img.style.setProperty('--end-top', Math.random() * 80 + 10 + '%');
            img.style.setProperty('--start-left', Math.random() * 80 + 10 + '%');
            img.style.setProperty('--end-left', Math.random() * 80 + 10 + '%');
            img.style.animation = (Math.random() > 0.5 ? 'fly-right' : 'fly-up') + ' ' + (Math.random()*10+15) + 's linear infinite';
            container.appendChild(img);
            setTimeout(() => img.remove(), 25000);
        }
        setInterval(createButterfly, 4000);

        const music = document.getElementById('bg-music');
        function toggleMusic() {
            if (music.paused) { music.play(); document.getElementById('music-text').innerText = "Đang Phát"; } 
            else { music.pause(); document.getElementById('music-text').innerText = "Đã Tắt"; }
        }
        window.onload = initGame;
    </script>
</body>
</html>
