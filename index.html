<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pikachu Pro 2026 - Yên Lộc</title>
    <style>
        :root { --tile-w: 44px; --tile-h: 56px; --cols: 6; --rows: 4; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000 url('background.jpg') no-repeat center center fixed;
            background-size: cover; font-family: sans-serif;
            overflow: hidden; color: white; display: flex; flex-direction: column; align-items: center;
        }
        .header-controls {
            width: 100%; padding: 10px 0; background: rgba(0,0,0,0.85);
            border-bottom: 2px solid #00f2fe; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .stats-row { display: flex; gap: 15px; font-weight: bold; font-size: 0.9rem; color: #00f2fe; }
        .game-container {
            flex: 1; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5px; box-sizing: border-box;
        }
        #game-board {
            display: grid; grid-template-columns: repeat(var(--cols), var(--tile-w));
            grid-template-rows: repeat(var(--rows), var(--tile-h));
            gap: 3px; padding: 8px; background: rgba(255,255,255,0.1);
            border-radius: 10px; border: 1px solid #00f2fe; justify-content: center;
        }
        .tile { 
            width: var(--tile-w); height: var(--tile-h); background-size: 100% 100%; 
            border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); transition: all 0.3s;
        }
        .tile.selected { border: 3px solid #fdfc47; box-shadow: 0 0 8px #fdfc47; transform: scale(1.05); }
        .tile.matched { opacity: 0; pointer-events: none; transform: scale(0); }
        .timer-bg { width: 150px; height: 6px; background: #222; border-radius: 5px; border: 1px solid #00f2fe; }
        #timer-bar { width: 100%; height: 100%; background: #00f2fe; }
        .btn-row { display: flex; gap: 8px; margin-top: 10px; }
        .btn-s { padding: 8px 12px; background: #111; border: 1px solid #00f2fe; color: white; border-radius: 5px; font-size: 11px; font-weight: bold; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 500; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 2px solid #00f2fe; text-align: center; width: 80%; max-width: 300px; }
        .input-name { width: 100%; padding: 10px; margin: 15px 0; border-radius: 5px; text-align: center; box-sizing: border-box; background: #333; color: #fff; border: 1px solid #444; }
        .menu-btn { width: 100%; padding: 12px; background: #00f2fe; color: #000; border: none; border-radius: 50px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="start-screen" class="modal">
        <div class="modal-box">
            <h2 style="color:#00f2fe; margin:0;">DÂU - RY</h2>
            <input type="text" id="p-name" class="input-name" placeholder="Nhập tên..." maxlength="10">
            <button class="menu-btn" onclick="initGame()">CHƠI NGAY</button>
            <button class="menu-btn" style="background:none; color:#00f2fe; border:1px solid #00f2fe;" onclick="showLeaderboard()">XẾP HẠNG</button>
        </div>
    </div>

    <div id="score-modal" class="modal" style="display:none;">
        <div class="modal-box">
            <h3 style="color:#fdfc47; margin-top:0;">🏆 BẢNG VÀNG 🏆</h3>
            <div id="score-list" style="text-align: left; max-height: 250px; overflow-y: auto; margin-bottom: 15px; font-size: 14px; color: #ddd;">
            </div>
            <button class="menu-btn" onclick="document.getElementById('score-modal').style.display='none'">ĐÓNG</button>
        </div>
    </div>

    <div id="game-view" style="display:none; width:100%; height:100%; flex-direction:column;">
        <div class="header-controls">
            <div class="stats-row">
                <span>LV: <b id="lv">1</b></span>
                <span><b id="sc">0</b>đ</span>
                <span>TRỘN: <b id="sh-count">3</b></span>
            </div>
            <div class="timer-bg"><div id="timer-bar"></div></div>
        </div>

        <div class="game-container">
            <div id="game-board"></div>
            <div class="btn-row">
                <button class="btn-s" onclick="shuffleBtn()">TRỘN</button>
                <button class="btn-s" id="m-btn" onclick="toggleMusic()">TẮT NHẠC</button>
                <button class="btn-s" onclick="location.reload()">MENU</button>
            </div>
        </div>
    </div>

    <script>
        const G_TOKEN = 'ghp_'+'7VuzaHkjDkYFq9OOtcSmCGDsIjcXiX2SlH7W';
        const G_REPO = 'locvitinh-blip/chill';

        const levels = [
            { c: 6, r: 4, t: 120, g: 'none' },
            { c: 6, r: 4, t: 110, g: 'down' },
            { c: 6, r: 6, t: 150, g: 'left' },
            { c: 6, r: 6, t: 140, g: 'up' },
            { c: 8, r: 6, t: 180, g: 'right' },
            { c: 8, r: 6, t: 170, g: 'down' },
            { c: 8, r: 7, t: 200, g: 'left' },
            { c: 8, r: 8, t: 250, g: 'up' },
            { c: 8, r: 8, t: 220, g: 'right' },
            { c: 8, r: 9, t: 300, g: 'down' }
        ];

        let curLv = 0, score = 0, pName = "", timer, timeLeft, board = [], selected = [], matched = 0, shuffles = 3, isProcessing = false;
        const imgs = Array.from({length: 15}, (_, i) => `images/con${i+1}.jpg`);
        let musicOn = false;

        function toggleMusic() {
            const m = document.getElementById('bg-music');
            const btn = document.getElementById('m-btn');
            if(!musicOn) { m.play(); btn.innerText = "TẮT NHẠC"; }
            else { m.pause(); btn.innerText = "MỞ NHẠC"; }
            musicOn = !musicOn;
        }

        function initGame() {
            pName = document.getElementById('p-name').value || "Dâu Ry";
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-view').style.display = 'flex';
            loadLevel();
        }

        function loadLevel() {
            clearInterval(timer);
            const lv = levels[curLv];
            document.getElementById('lv').innerText = curLv + 1;
            document.documentElement.style.setProperty('--cols', lv.c);
            document.documentElement.style.setProperty('--rows', lv.r);
            timeLeft = lv.t; updateBar();
            timer = setInterval(() => { timeLeft--; updateBar(); if(timeLeft<=0) gameOver(); }, 1000);
            matched = 0; shuffles = 3; document.getElementById('sh-count').innerText = shuffles;
            generateBoard();
        }

        function generateBoard() {
            const lv = levels[curLv];
            let pairs = [];
            for(let i=0; i<(lv.c * lv.r)/2; i++) { pairs.push(i % imgs.length, i % imgs.length); }
            pairs.sort(() => Math.random() - 0.5);
            board = [];
            for(let r=0; r<lv.r; r++) {
                board[r] = [];
                for(let c=0; c<lv.c; c++) { board[r][c] = pairs.pop(); }
            }
            renderBoard();
        }

        function renderBoard() {
            const container = document.getElementById('game-board');
            container.innerHTML = '';
            board.forEach((row, r) => {
                row.forEach((id, c) => {
                    const tile = document.createElement('div');
                    tile.className = `tile ${id === -1 ? 'matched' : ''}`;
                    if(id !== -1) {
                        tile.style.backgroundImage = `url('${imgs[id]}')`;
                        tile.onclick = () => clickTile(r, c);
                    }
                    container.appendChild(tile);
                });
            });
        }

        function clickTile(r, c) {
            if (isProcessing || board[r][c] === -1) return;
            const tiles = document.querySelectorAll('.tile');
            const idx = r * levels[curLv].c + c;
            tiles[idx].classList.add('selected');
            selected.push({r, c, id: board[r][c]});

            if(selected.length === 2) {
                isProcessing = true;
                const [a, b] = selected;
                if(a.id === b.id && (a.r !== b.r || a.c !== b.c)) {
                    board[a.r][a.c] = -1; board[b.r][b.c] = -1;
                    score += 100; document.getElementById('sc').innerText = score;
                    matched += 2;
                    setTimeout(() => {
                        applyGravity();
                        renderBoard();
                        if(matched === levels[curLv].c * levels[curLv].r) {
                            if(curLv < levels.length - 1) {
                                curLv++; loadLevel();
                            } else {
                                saveScore(); alert("PHÁ ĐẢO TUYỆT ĐỐI!"); location.reload();
                            }
                        }
                        isProcessing = false;
                    }, 300);
                } else {
                    setTimeout(() => { renderBoard(); isProcessing = false; }, 300);
                }
                selected = [];
            }
        }

        function applyGravity() {
            const mode = levels[curLv].g;
            const rows = levels[curLv].r;
            const cols = levels[curLv].c;
            if(mode === 'down') {
                for(let c=0; c<cols; c++) {
                    let temp = [];
                    for(let r=0; r<rows; r++) if(board[r][c] !== -1) temp.push(board[r][c]);
                    while(temp.length < rows) temp.unshift(-1);
                    for(let r=0; r<rows; r++) board[r][c] = temp[r];
                }
            } else if(mode === 'up') {
                for(let c=0; c<cols; c++) {
                    let temp = [];
                    for(let r=0; r<rows; r++) if(board[r][c] !== -1) temp.push(board[r][c]);
                    while(temp.length < rows) temp.push(-1);
                    for(let r=0; r<rows; r++) board[r][c] = temp[r];
                }
            } else if(mode === 'left') {
                for(let r=0; r<rows; r++) {
                    let temp = board[r].filter(id => id !== -1);
                    while(temp.length < cols) temp.push(-1);
                    board[r] = temp;
                }
            } else if(mode === 'right') {
                for(let r=0; r<rows; r++) {
                    let temp = board[r].filter(id => id !== -1);
                    while(temp.length < cols) temp.unshift(-1);
                    board[r] = temp;
                }
            }
        }

        function shuffleLogic() {
            let active = [];
            board.forEach(row => row.forEach(id => { if(id !== -1) active.push(id); }));
            active.sort(() => Math.random() - 0.5);
            board.forEach((row, r) => {
                row.forEach((id, c) => { if(board[r][c] !== -1) board[r][c] = active.pop(); });
            });
            shuffles--; document.getElementById('sh-count').innerText = shuffles;
            renderBoard();
        }

        function shuffleBtn() { if(shuffles > 0) shuffleLogic(); }
        function updateBar() { document.getElementById('timer-bar').style.width = (timeLeft/levels[curLv].t)*100 + '%'; }
        function gameOver() { saveScore(); alert("HẾT GIỜ! Điểm: " + score); location.reload(); }

        // --- HỆ THỐNG XẾP HẠNG GITHUB ---
        async function showLeaderboard() {
            const list = document.getElementById('score-list');
            document.getElementById('score-modal').style.display = 'flex';
            list.innerHTML = "<p style='text-align:center;'>Đang tải...</p>";
            try {
                const res = await fetch(`https://api.github.com/repos/${G_REPO}/issues?state=all&per_page=10`, {
                    headers: { 'Authorization': `token ${G_TOKEN}` }
                });
                const data = await res.json();
                if (data.length === 0) list.innerHTML = "<p style='text-align:center;'>Chưa có dữ liệu.</p>";
                else list.innerHTML = data.map(i => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #333;"><span>👤 ${i.body}</span><b>${i.title.replace('SCORE: ','')}đ</b></div>`).join('');
            } catch (e) { list.innerHTML = "<p style='text-align:center;color:red;'>Lỗi tải bảng điểm!</p>"; }
        }

        async function saveScore() {
            if (score <= 0) return;
            try {
                await fetch(`https://api.github.com/repos/${G_REPO}/issues`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${G_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: `SCORE: ${score}`, body: `${pName}` })
                });
            } catch(e) { console.error("Lỗi lưu điểm"); }
        }
    </script>
</body>
</html>
