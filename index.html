<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yến Lộc - Thử Thách 4 Màn</title>
    <style>
        :root {
            --tile-w: 14vw;
            --tile-h: 7.5vh;
            --cols: 4;
            --rows: 5;
        }

        @media (min-width: 600px) {
            :root { --tile-w: 60px; --tile-h: 75px; }
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: #000 url('background.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif;
            touch-action: none;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.3); z-index: 1; }
        
        #game-container {
            position: absolute; top: 42%; left: 50%; transform: translate(-50%, -50%);
            z-index: 5; display: flex; flex-direction: column; align-items: center; width: 100%;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(var(--cols), var(--tile-w));
            grid-template-rows: repeat(var(--rows), var(--tile-h));
            gap: 4px; padding: 6px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .tile {
            width: var(--tile-w); height: var(--tile-h);
            background-size: cover; background-position: center;
            border-radius: 6px; cursor: pointer;
            transition: 0.1s; border: 2px solid transparent;
        }
        .tile.selected { border-color: #00f2fe; box-shadow: 0 0 12px #00f2fe; transform: scale(1.05); z-index: 2; }
        .tile.matched { opacity: 0; visibility: hidden; pointer-events: none; }

        .game-header { color: white; text-align: center; text-shadow: 2px 2px 5px #000; margin-bottom: 5px; }
        h1 { font-size: 1.4rem; margin: 0; letter-spacing: 2px; }
        #level-info { font-size: 0.9rem; color: #00f2fe; font-weight: bold; margin-bottom: 5px; }

        .controls-wrapper {
            position: fixed; bottom: 25px; left: 0; right: 0;
            z-index: 100; display: flex; justify-content: center; gap: 12px;
        }

        .btn-chill {
            padding: 8px 18px; background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 25px;
            color: white; cursor: pointer; backdrop-filter: blur(5px); font-size: 0.8rem;
        }

        #butterfly-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .butterfly { position: absolute; width: 35px; height: 35px; }
        @keyframes fly-right { 0% { left: -10%; top: var(--t); opacity: 0; } 100% { left: 110%; top: var(--et); opacity: 0; } }
        @keyframes fly-up { 0% { bottom: -10%; left: var(--l); opacity: 0; } 100% { bottom: 110%; left: var(--el); opacity: 0; } }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div id="game-container">
        <div class="game-header">
            <h1>DÂU VÀ RY</h1>
            <div id="level-info">MÀN 1</div>
        </div>
        <div id="game-board"></div>
        <button class="btn-chill" style="margin-top:10px" onclick="resetLevel()">Chơi Lại Màn Này</button>
    </div>

    <div id="butterfly-container"></div>

    <div class="controls-wrapper">
        <button class="btn-chill" onclick="toggleButterflies()">🦋 Bướm</button>
        <button class="btn-chill" onclick="toggleMusic()">🎵 Nhạc</button>
    </div>

    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <script>
        // Cấu hình 4 màn chơi
        const levels = [
            { name: "MÀN 1: KHỞI ĐẦU", cols: 4, rows: 4, tileW: "18vw", tileH: "10vh" }, // 16 ô (8 cặp)
            { name: "MÀN 2: DỄ THƯƠNG", cols: 4, rows: 6, tileW: "17vw", tileH: "9vh" },  // 24 ô (12 cặp)
            { name: "MÀN 3: GẮN KẾT", cols: 6, rows: 6, tileW: "14vw", tileH: "8vh" },   // 36 ô (18 cặp)
            { name: "MÀN 4: YÊU THƯƠNG", cols: 6, rows: 10, tileW: "13vw", tileH: "7vh" } // 60 ô (30 cặp)
        ];

        let currentLevelIdx = 0;
        const childImages = [
            'images/con1.jpg', 'images/con2.jpg', 'images/con3.jpg', 'images/con4.jpg', 'images/con5.jpg',
            'images/con6.jpg', 'images/con7.jpg', 'images/con8.jpg', 'images/con9.jpg', 'images/con10.jpg',
            'images/con11.jpg', 'images/con12.jpg', 'images/con13.jpg', 'images/con14.jpg', 'images/con15.jpg'
        ];

        let board = []; 
        let selectedTiles = [];
        let matchedCount = 0;
        let isButterflyActive = true;

        function initLevel() {
            const level = levels[currentLevelIdx];
            const gameBoard = document.getElementById('game-board');
            document.getElementById('level-info').innerText = level.name;

            // Cập nhật kích thước ô và số cột/hàng vào CSS
            document.documentElement.style.setProperty('--cols', level.cols);
            document.documentElement.style.setProperty('--rows', level.rows);
            if(window.innerWidth <= 600) {
                document.documentElement.style.setProperty('--tile-w', level.tileW);
                document.documentElement.style.setProperty('--tile-h', level.tileH);
            }

            gameBoard.innerHTML = '';
            board = []; selectedTiles = []; matchedCount = 0;
            
            let tileList = [];
            const totalTiles = level.cols * level.rows;
            for (let i = 0; i < totalTiles / 2; i++) {
                let imgIdx = i % childImages.length;
                tileList.push(imgIdx, imgIdx);
            }
            tileList.sort(() => Math.random() - 0.5);

            for (let r = -1; r <= level.rows; r++) {
                board[r] = [];
                for (let c = -1; c <= level.cols; c++) {
                    if (r === -1 || r === level.rows || c === -1 || c === level.cols) {
                        board[r][c] = -1;
                    } else {
                        let imgIdx = tileList.pop();
                        board[r][c] = imgIdx;
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.id = `tile-${r}-${c}`;
                        tile.style.backgroundImage = `url('${childImages[imgIdx]}')`;
                        tile.onclick = () => handleTileClick(r, c, level.rows, level.cols);
                        gameBoard.appendChild(tile);
                    }
                }
            }
        }

        function handleTileClick(r, c, maxR, maxC) {
            if (board[r][c] === -1) return;
            const tile = document.getElementById(`tile-${r}-${c}`);
            if (selectedTiles.length === 1 && selectedTiles[0].r === r && selectedTiles[0].c === c) {
                tile.classList.remove('selected'); selectedTiles = []; return;
            }
            tile.classList.add('selected');
            selectedTiles.push({ r, c, idx: board[r][c] });

            if (selectedTiles.length === 2) {
                const t1 = selectedTiles[0], t2 = selectedTiles[1];
                if (t1.idx === t2.idx && checkConnect(t1, t2, maxR, maxC)) {
                    setTimeout(() => {
                        document.getElementById(`tile-${t1.r}-${t1.c}`).classList.add('matched');
                        document.getElementById(`tile-${t2.r}-${t2.c}`).classList.add('matched');
                        board[t1.r][t1.c] = board[t2.r][t2.c] = -1;
                        matchedCount += 2;
                        if (matchedCount === maxR * maxC) nextLevel();
                    }, 200);
                } else {
                    setTimeout(() => {
                        document.getElementById(`tile-${t1.r}-${t1.c}`).classList.remove('selected');
                        document.getElementById(`tile-${t2.r}-${t2.c}`).classList.remove('selected');
                    }, 400);
                }
                selectedTiles = [];
            }
        }

        function nextLevel() {
            if (currentLevelIdx < levels.length - 1) {
                alert("Tuyệt vời! Qua màn tiếp theo nhé!");
                currentLevelIdx++;
                initLevel();
            } else {
                alert("Chúc mừng! Bạn đã hoàn thành tất cả các màn chơi của con!");
                currentLevelIdx = 0;
                initLevel();
            }
        }

        function checkConnect(p1, p2, maxR, maxC) {
            const isEmpty = (r, c) => (r >= -1 && r <= maxR && c >= -1 && c <= maxC && board[r][c] === -1);
            const checkL = (v1, v2, f, isR) => {
                for (let i = Math.min(v1, v2) + 1; i < Math.max(v1, v2); i++)
                    if (isR ? !isEmpty(f, i) : !isEmpty(i, f)) return false;
                return true;
            };
            if (p1.r === p2.r && checkL(p1.c, p2.c, p1.r, true)) return true;
            if (p1.c === p2.c && checkL(p1.r, p2.r, p1.c, false)) return true;
            if (isEmpty(p1.r, p2.c) && checkL(p1.c, p2.c, p1.r, true) && checkL(p1.r, p2.r, p2.c, false)) return true;
            if (isEmpty(p2.r, p1.c) && checkL(p1.r, p2.r, p1.c, false) && checkL(p1.c, p2.c, p2.r, true)) return true;
            for (let r = -1; r <= maxR; r++)
                if (isEmpty(r, p1.c) && checkL(p1.r, r, p1.c, false) && isEmpty(r, p2.c) && checkL(p1.c, p2.c, r, true) && checkL(r, p2.r, p2.c, false)) return true;
            for (let c = -1; c <= maxC; c++)
                if (isEmpty(p1.r, c) && checkL(p1.c, c, p1.r, true) && isEmpty(p2.r, c) && checkL(p1.r, p2.r, c, false) && checkL(c, p2.c, p2.r, true)) return true;
            return false;
        }

        function createButterfly() {
            if (!isButterflyActive) return;
            const container = document.getElementById('butterfly-container');
            const b = document.createElement('img');
            b.src = 'butterfly.gif'; b.className = 'butterfly';
            b.style.setProperty('--t', Math.random() * 90 + '%');
            b.style.setProperty('--et', Math.random() * 90 + '%');
            b.style.setProperty('--l', Math.random() * 90 + '%');
            b.style.setProperty('--el', Math.random() * 90 + '%');
            b.style.animation = (Math.random() > 0.5 ? 'fly-right' : 'fly-up') + ' ' + (Math.random()*6+8) + 's linear forwards';
            container.appendChild(b);
            setTimeout(() => b.remove(), 14000);
        }

        function toggleButterflies() {
            isButterflyActive = !isButterflyActive;
            if (!isButterflyActive) document.getElementById('butterfly-container').innerHTML = '';
        }

        function toggleMusic() {
            const m = document.getElementById('bg-music');
            m.paused ? m.play() : m.pause();
        }

        function resetLevel() { initLevel(); }
        window.onload = () => { initLevel(); setInterval(createButterfly, 4500); };
    </script>
</body>
</html>
