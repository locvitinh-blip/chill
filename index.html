<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yên Lộc - Pikachu Fix 2026</title>
    <style>
        :root { --tile-w: 42px; --tile-h: 55px; --cols: 6; --rows: 4; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000 url('background.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; color: white; position: fixed; /* Chống cuộn bậy */
        }

        /* --- XOAY WEB TOÀN DIỆN --- */
        body.rotated-web {
            width: 100vh !important;
            height: 100vw !important;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
            transform-origin: center center;
        }

        #game-view { 
            display: none; width: 100%; height: 100%; 
            flex-direction: column; 
        }

        .header-controls {
            height: 60px; /* Cố định chiều cao header */
            background: rgba(0,0,0,0.9);
            border-bottom: 2px solid #00f2fe;
            display: flex; justify-content: space-around; align-items: center;
            padding: 0 10px; z-index: 100;
        }

        .game-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            overflow: hidden; padding: 10px;
        }

        /* TỰ CO GIÃN BẢNG GAME THEO MÀN HÌNH */
        #game-board {
            display: grid;
            grid-template-columns: repeat(var(--cols), var(--tile-w));
            grid-template-rows: repeat(var(--rows), var(--tile-h));
            gap: 2px; padding: 8px; background: rgba(255,255,255,0.1);
            border-radius: 10px; border: 1px solid #00f2fe;
            transform: scale(0.9); /* Mặc định thu nhỏ nhẹ để an toàn */
        }

        @media (max-height: 400px) { #game-board { transform: scale(0.7); } }
        @media (max-width: 400px) { #game-board { transform: scale(0.8); } }

        .tile { 
            width: var(--tile-w); height: var(--tile-h); 
            background-size: 100% 100%; border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .tile.selected { border: 3px solid #fdfc47; box-shadow: 0 0 10px #fdfc47; }
        .tile.matched { opacity: 0 !important; pointer-events: none; }

        .btn-action {
            padding: 10px 15px; background: #222; border: 1px solid #00f2fe;
            color: white; border-radius: 8px; font-size: 12px; font-weight: bold;
        }

        .timer-bg { width: 80px; height: 10px; background: #111; border: 1px solid #00f2fe; border-radius: 5px; }
        #timer-bar { width: 100%; height: 100%; background: #00f2fe; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 500; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid #00f2fe; text-align: center; }
        .menu-btn { width: 100%; padding: 15px; background: #00f2fe; color: black; border: none; border-radius: 50px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body id="main-body">

    <div id="start-screen" class="modal">
        <div class="modal-box">
            <h1 style="color:#00f2fe; margin:0;">YÊN LỘC</h1>
            <p style="font-size: 14px; margin-bottom: 20px;">LỘC VI TÍNH</p>
            <button class="menu-btn" onclick="startAndFull()">VÀO GAME & FULL MÀN HÌNH</button>
        </div>
    </div>

    <div id="game-view">
        <div class="header-controls">
            <div style="font-size: 12px;">LV <span id="lv">1</span> - <span id="sc">0</span>đ</div>
            <div class="timer-bg"><div id="timer-bar"></div></div>
            <button class="btn-action" onclick="toggleRotate()">XOAY WEB</button>
            <button class="btn-action" onclick="shuffleBtn()">TRỘN</button>
            <button class="btn-action" onclick="location.reload()">MENU</button>
        </div>
        <div class="game-container">
            <div id="game-board"></div>
        </div>
    </div>

    <script>
        const G_TOKEN = 'ghp_' + '7VuzaHkjDkYFq9OOtcSmCGDsIjcXiX2SlH7W';
        const G_REPO = 'locvitinh-blip/chill';

        const levels = [
            { c: 6, r: 4, t: 150 },
            { c: 8, r: 5, t: 200 },
            { c: 10, r: 6, t: 300 }
        ];

        let curLv = 0, score = 0, timer, timeLeft, board = [], selected = [], matched = 0, shuffles = 3, isProcessing = false;
        const imgs = Array.from({length: 15}, (_, i) => `images/con${i+1}.jpg`);

        // HÀM QUAN TRỌNG: VỪA CHƠI VỪA ÉP FULLSCREEN
        function startAndFull() {
            // Mở Fullscreen ngay khi bấm nút để trình duyệt cho phép ẩn thanh địa chỉ
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            else if (doc.msRequestFullscreen) doc.msRequestFullscreen();

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-view').style.display = 'flex';
            loadLevel();
        }

        function toggleRotate() {
            document.getElementById('main-body').classList.toggle('rotated-web');
        }

        function loadLevel() {
            clearInterval(timer);
            const lv = levels[curLv];
            document.getElementById('lv').innerText = curLv + 1;
            document.documentElement.style.setProperty('--cols', lv.c);
            document.documentElement.style.setProperty('--rows', lv.r);
            timeLeft = lv.t; updateBar();
            timer = setInterval(() => { timeLeft--; updateBar(); if(timeLeft<=0) location.reload(); }, 1000);
            matched = 0; shuffles = 3; isProcessing = false;
            generateBoard();
        }

        function generateBoard() {
            const lv = levels[curLv];
            let pairs = [];
            for(let i=0; i<(lv.c * lv.r)/2; i++) { pairs.push(i % imgs.length, i % imgs.length); }
            pairs.sort(() => Math.random() - 0.5);
            const container = document.getElementById('game-board');
            container.innerHTML = ''; board = [];
            for(let r=0; r<lv.r; r++) {
                board[r] = [];
                for(let c=0; c<lv.c; c++) {
                    const id = pairs.pop(); board[r][c] = id;
                    const tile = document.createElement('div');
                    tile.id = `t-${r}-${c}`; tile.className = 'tile';
                    tile.style.backgroundImage = `url('${imgs[id]}')`;
                    tile.onclick = () => clickTile(r, c);
                    container.appendChild(tile);
                }
            }
        }

        function clickTile(r, c) {
            if (isProcessing || board[r][c] === -1) return;
            const tileEl = document.getElementById(`t-${r}-${c}`);
            tileEl.classList.add('selected');
            selected.push({r, c, id: board[r][c]});

            if(selected.length === 2) {
                isProcessing = true;
                const [a, b] = selected;
                if(a.id === b.id && (a.r !== b.r || a.c !== b.c)) {
                    document.getElementById(`t-${a.r}-${a.c}`).classList.add('matched');
                    document.getElementById(`t-${b.r}-${b.c}`).classList.add('matched');
                    board[a.r][a.c] = -1; board[b.r][b.c] = -1;
                    score += 100; document.getElementById('sc').innerText = score;
                    matched += 2;
                    if(matched === levels[curLv].c * levels[curLv].r) {
                        curLv < levels.length-1 ? (curLv++, loadLevel()) : alert("THẮNG!");
                    }
                    isProcessing = false;
                } else {
                    setTimeout(() => {
                        document.getElementById(`t-${a.r}-${a.c}`).classList.remove('selected');
                        document.getElementById(`t-${b.r}-${b.c}`).classList.remove('selected');
                        isProcessing = false;
                    }, 300);
                }
                selected = [];
            }
        }

        function shuffleLogic() {
            let currentImgs = [];
            board.forEach(row => row.forEach(id => { if(id !== -1) currentImgs.push(id); }));
            currentImgs.sort(() => Math.random() - 0.5);
            board.forEach((row, r) => {
                row.forEach((id, c) => { if(board[r][c] !== -1) board[r][c] = currentImgs.pop(); });
            });
            shuffles--;
            board.forEach((row, r) => {
                row.forEach((id, c) => {
                    const tile = document.getElementById(`t-${r}-${c}`);
                    if (id !== -1) tile.style.backgroundImage = `url('${imgs[id]}')`;
                });
            });
        }

        function shuffleBtn() { if(shuffles > 0) shuffleLogic(); }
        function updateBar() { document.getElementById('timer-bar').style.width = (timeLeft/levels[curLv].t)*100 + '%'; }
    </script>
</body>
</html>
