<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yên Lộc - Mobile Thơ Mộng</title>
    <style>
        /* Cấu hình kích thước ô gạch */
        :root {
            --tile-w: 65px;
            --tile-h: 75px;
            --cols: 10;
            --rows: 8;
        }

        /* Responsive cho điện thoại (Rất quan trọng) */
        @media (max-width: 600px) {
            :root {
                --tile-w: 18vw; /* Tự co giãn theo chiều rộng màn hình */
                --tile-h: 11vh; /* Tự co giãn theo chiều cao màn hình */
                --cols: 5;
                --rows: 16;
            }
            h1 { font-size: 1.2rem !important; margin: 2px 0 !important; }
            p { font-size: 0.7rem; margin: 0 !important; }
            .btn-chill { padding: 8px 15px !important; font-size: 0.75rem !important; }
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: #000 url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none; /* Ngăn chặn các thao tác vuốt mặc định của trình duyệt */
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.3); z-index: 1; }
        
        #game-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 5; display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 100vw;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(var(--cols), var(--tile-w));
            grid-template-rows: repeat(var(--rows), var(--tile-h));
            gap: 2px; padding: 5px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }

        .tile {
            width: var(--tile-w); height: var(--tile-h);
            background-size: cover; background-position: center;
            border-radius: 4px; cursor: pointer;
            transition: 0.1s; border: 1px solid transparent;
        }
        .tile.selected { border-color: #00f2fe; box-shadow: 0 0 10px #00f2fe; z-index: 2; }
        .tile.matched { opacity: 0; visibility: hidden; pointer-events: none; }

        .game-header { color: white; text-align: center; margin-bottom: 5px; }
        
        .btn-chill {
            padding: 10px 20px; background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 20px;
            color: white; cursor: pointer; backdrop-filter: blur(5px);
        }

        /* Hệ thống bướm */
        #butterfly-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .butterfly { position: absolute; width: 40px; height: 40px; opacity: 0; }
        
        @keyframes fly-right { 0% { left: -10%; top: var(--t); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { left: 110%; top: var(--et); opacity: 0; } }
        @keyframes fly-up { 0% { bottom: -10%; left: var(--l); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { bottom: 110%; left: var(--el); opacity: 0; } }
        
        .controls-wrapper {
            position: fixed; bottom: 15px; right: 10px; z-index: 100;
            display: flex; gap: 8px;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div id="game-container">
        <div class="game-header">
            <h1>YÊN LỘC</h1>
            <p>Nối nụ cười của con</p>
        </div>
        <div id="game-board"></div>
        <button class="btn-chill" style="margin-top:10px" onclick="resetGame()">Ván Mới</button>
    </div>

    <div id="butterfly-container"></div>

    <div class="controls-wrapper">
        <button class="btn-chill" onclick="toggleButterflies()">🦋 <span id="btf-text">Tắt Bướm</span></button>
        <button class="btn-chill" onclick="toggleMusic()">🎵 Nhạc</button>
    </div>

    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <script>
        const isMobile = window.innerWidth <= 600;
        const ROWS = isMobile ? 16 : 8; 
        const COLS = isMobile ? 5 : 10; 

        const childImages = [
            'images/con1.jpg', 'images/con2.jpg', 'images/con3.jpg', 'images/con4.jpg',
            'images/con5.jpg', 'images/con6.jpg', 'images/con7.jpg', 'images/con8.jpg',
            'images/con9.jpg', 'images/con10.jpg'
        ];

        let board = []; 
        let selectedTiles = [];
        let matchedCount = 0;
        let butterflyInterval = null;
        let isButterflyActive = true;

        function initGame() {
            const gameBoard = document.getElementById('game-board');
            gameBoard.innerHTML = '';
            board = [];
            selectedTiles = [];
            matchedCount = 0;

            let tileList = [];
            for (let i = 0; i < (ROWS * COLS) / 2; i++) {
                let imgIdx = i % childImages.length;
                tileList.push(imgIdx, imgIdx);
            }
            tileList.sort(() => Math.random() - 0.5);

            for (let r = -1; r <= ROWS; r++) {
                board[r] = [];
                for (let c = -1; c <= COLS; c++) {
                    if (r === -1 || r === ROWS || c === -1 || c === COLS) {
                        board[r][c] = -1;
                    } else {
                        let imgIdx = tileList.pop();
                        board[r][c] = imgIdx;
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.id = `tile-${r}-${c}`;
                        tile.style.backgroundImage = `url('${childImages[imgIdx]}')`;
                        tile.onclick = () => handleTileClick(r, c);
                        gameBoard.appendChild(tile);
                    }
                }
            }
        }

        function handleTileClick(r, c) {
            if (board[r][c] === -1) return;
            const tile = document.getElementById(`tile-${r}-${c}`);
            if (selectedTiles.length === 1 && selectedTiles[0].r === r && selectedTiles[0].c === c) {
                tile.classList.remove('selected');
                selectedTiles = [];
                return;
            }
            tile.classList.add('selected');
            selectedTiles.push({ r, c, idx: board[r][c] });

            if (selectedTiles.length === 2) {
                const t1 = selectedTiles[0], t2 = selectedTiles[1];
                if (t1.idx === t2.idx && checkConnect(t1, t2)) {
                    setTimeout(() => {
                        document.getElementById(`tile-${t1.r}-${t1.c}`).classList.add('matched');
                        document.getElementById(`tile-${t2.r}-${t2.c}`).classList.add('matched');
                        board[t1.r][t1.c] = board[t2.r][t2.c] = -1;
                        matchedCount += 2;
                        if (matchedCount === ROWS * COLS) alert("Tuyệt vời!");
                    }, 200);
                } else {
                    setTimeout(() => {
                        document.getElementById(`tile-${t1.r}-${t1.c}`).classList.remove('selected');
                        document.getElementById(`tile-${t2.r}-${t2.c}`).classList.remove('selected');
                    }, 400);
                }
                selectedTiles = [];
            }
        }

        function checkConnect(p1, p2) {
            const isEmpty = (r, c) => (r >= -1 && r <= ROWS && c >= -1 && c <= COLS && board[r][c] === -1);
            const checkL = (v1, v2, f, isR) => {
                for (let i = Math.min(v1, v2) + 1; i < Math.max(v1, v2); i++)
                    if (isR ? !isEmpty(f, i) : !isEmpty(i, f)) return false;
                return true;
            };
            if (p1.r === p2.r && checkL(p1.c, p2.c, p1.r, true)) return true;
            if (p1.c === p2.c && checkL(p1.r, p2.r, p1.c, false)) return true;
            if (isEmpty(p1.r, p2.c) && checkL(p1.c, p2.c, p1.r, true) && checkL(p1.r, p2.r, p2.c, false)) return true;
            if (isEmpty(p2.r, p1.c) && checkL(p1.r, p2.r, p1.c, false) && checkL(p1.c, p2.c, p2.r, true)) return true;
            for (let r = -1; r <= ROWS; r++)
                if (isEmpty(r, p1.c) && checkL(p1.r, r, p1.c, false) && isEmpty(r, p2.c) && checkL(p1.c, p2.c, r, true) && checkL(r, p2.r, p2.c, false)) return true;
            for (let c = -1; c <= COLS; c++)
                if (isEmpty(p1.r, c) && checkL(p1.c, c, p1.r, true) && isEmpty(p2.r, c) && checkL(p1.r, p2.r, c, false) && checkL(c, p2.c, p2.r, true)) return true;
            return false;
        }

        function resetGame() { initGame(); }

        function createButterfly() {
            if (!isButterflyActive) return;
            const container = document.getElementById('butterfly-container');
            const b = document.createElement('img');
            b.src = 'butterfly.gif'; b.className = 'butterfly';
            b.style.setProperty('--t', Math.random() * 90 + '%');
            b.style.setProperty('--et', Math.random() * 90 + '%');
            b.style.setProperty('--l', Math.random() * 90 + '%');
            b.style.setProperty('--el', Math.random() * 90 + '%');
            b.style.animation = (Math.random() > 0.5 ? 'fly-right' : 'fly-up') + ' ' + (Math.random()*5+10) + 's linear forwards';
            container.appendChild(b);
            setTimeout(() => b.remove(), 15000);
        }

        function toggleButterflies() {
            const txt = document.getElementById('btf-text');
            const container = document.getElementById('butterfly-container');
            if (isButterflyActive) {
                isButterflyActive = false;
                container.innerHTML = ''; // Xóa sạch bướm đang bay
                txt.innerText = "Bật Bướm";
            } else {
                isButterflyActive = true;
                txt.innerText = "Tắt Bướm";
            }
        }

        function toggleMusic() {
            const m = document.getElementById('bg-music');
            m.paused ? m.play() : m.pause();
        }

        window.onload = function() {
            initGame();
            setInterval(createButterfly, 3000);
        };
    </script>
</body>
</html>
