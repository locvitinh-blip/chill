<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thác Nước Chill Chill</title>
    <style>
        /* 1. Thiết lập nền toàn màn hình */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Không cho cuộn trang */
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* 2. Tạo hiệu ứng bướm bay */
        .butterfly {
            position: absolute;
            width: 100px; /* Kích thước bướm */
            z-index: 10;
            pointer-events: none;
            /* Hiệu ứng bay ngẫu nhiên */
            animation: fly 15s linear infinite;
        }

        @keyframes fly {
            0% { left: -10%; top: 70%; transform: scale(1); }
            25% { left: 30%; top: 40%; transform: scale(1.2) rotate(20deg); }
            50% { left: 60%; top: 60%; transform: scale(1); }
            75% { left: 80%; top: 30%; transform: scale(0.8) rotate(-20deg); }
            100% { left: 110%; top: 50%; }
        }

        /* 3. Lớp phủ mờ cho thêm phần ảo diệu */
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.1); /* Làm tối nhẹ để nổi bật hiệu ứng */
        }

        /* 4. Nhạc nền (Ẩn đi) */
        #myAudio { display: none; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <img src="butterfly.gif" class="butterfly" alt="butterfly">

    <img src="butterfly.gif" class="butterfly" style="animation-duration: 20s; animation-delay: 2s;" alt="butterfly">

    <audio id="myAudio" loop>
      <source src="music.mp3" type="audio/mpeg">
    </audio>

    <button onclick="playAudio()" style="position: fixed; bottom: 20px; right: 20px; z-index: 100; padding: 10px; cursor: pointer; border-radius: 50%; border: none; background: white; opacity: 0.6;">
        🎵 Play Music
    </button>

    <script>
        function playAudio() {
            var x = document.getElementById("myAudio");
            x.play();
        }
    </script>
</body>
</html>
