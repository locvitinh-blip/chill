<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yên Lộc - Pikachu Pro Max</title>
    <style>
        :root { --tile-w: 42px; --tile-h: 52px; --cols: 6; --rows: 4; }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: #000 url('background.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; color: white; display: flex; flex-direction: column;
        }

        /* --- CHẾ ĐỘ XOAY TOÀN WEB --- */
        body.rotated-web {
            width: 100vh !important;
            height: 100vw !important;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
            transform-origin: center center;
        }

        #game-view { display: none; flex-direction: column; width: 100%; height: 100%; }

        .header-controls {
            padding: 10px; background: rgba(0,0,0,0.95);
            border-bottom: 2px solid #00f2fe;
            display: flex; justify-content: space-around; align-items: center;
        }

        .stats { font-weight: bold; font-size: 0.85rem; color: #00f2fe; }

        .game-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(var(--cols), var(--tile-w));
            grid-template-rows: repeat(var(--rows), var(--tile-h));
            gap: 2px; padding: 10px; background: rgba(255,255,255,0.1);
            border-radius: 8px; border: 1px solid rgba(0,242,254,0.3);
        }

        .tile { 
            width: var(--tile-w); height: var(--tile-h); 
            background-size: 100% 100%; border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer; transition: transform 0.1s;
        }
        .tile.selected { border: 3px solid #fdfc47; box-shadow: 0 0 10px #fdfc47; transform: scale(1.05); }
        .tile.matched { opacity: 0 !important; pointer-events: none; visibility: hidden; }

        .timer-bg { width: 120px; height: 6px; background: #222; border-radius: 10px; border: 1px solid #00f2fe; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #00f2fe; }

        .btn-s { padding: 8px 12px; background: #222; border: 1px solid #00f2fe; color: white; border-radius: 5px; font-size: 11px; cursor: pointer; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid #00f2fe; text-align: center; width: 80%; max-width: 300px; }
        .menu-btn { width: 100%; padding: 12px; background: #00f2fe; color: black; border: none; border-radius: 50px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body id="main-body">

    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="start-screen" class="modal">
        <div class="modal-box">
            <h1 style="color:#00f2fe; margin:0;">YÊN LỘC</h1>
            <p style="font-size: 11px; color: #888;">LỘC VI TÍNH - PIKACHU 2026</p>
            <input type="text" id="p-name" placeholder="Tên bạn..." maxlength="10" style="width:80%; padding:10px; margin:15px 0; text-align:center; border-radius:5px; border:none;">
            <button class="menu-btn" onclick="initGame()">VÀO GAME</button>
        </div>
    </div>

    <div id="game-view">
        <div class="header-controls">
            <div class="stats">LV <span id="lv">1</span> | <span id="sc">0</span>đ</div>
            <div class="timer-bg"><div id="timer-bar"></div></div>
            <button class="btn-s" onclick="toggleFullLandscape()">XOAY FULL</button>
            <button class="btn-s" onclick="shuffleBtn()">TRỘN</button>
            <button class="btn-s" onclick="location.reload()">MENU</button>
        </div>
        <div class="game-container">
            <div id="game-board"></div>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH TOKEN ---
        const G_TOKEN = 'ghp_' + '7VuzaHkjDkYFq9OOtcSmCGDsIjcXiX2SlH7W';
        const G_REPO = 'locvitinh-blip/chill';

        const levels = [
            { c: 6, r: 4, t: 150 }, // Màn 1 xoay ngang cực đẹp
            { c: 8, r: 5, t: 200 },
            { c: 10, r: 6, t: 300 }
        ];

        let curLv = 0, score = 0, name = "", timer, timeLeft, board = [], selected = [], matched = 0, shuffles = 3, isProcessing = false;
        const imgs = Array.from({length: 15}, (_, i) => `images/con${i+1}.jpg`);

        // HÀM QUAN TRỌNG: XOAY VÀ FULLSCREEN
        function toggleFullLandscape() {
            const body = document.getElementById('main-body');
            body.classList.toggle('rotated-web');

            // Yêu cầu Fullscreen
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log("Không thể vào chế độ toàn màn hình");
                });
            } else {
                document.exitFullscreen();
            }
        }

        function initGame() {
            name = document.getElementById('p-name').value || "Yên Lộc";
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-view').style.display = 'flex';
            loadLevel();
        }

        function loadLevel() {
            clearInterval(timer);
            const lv = levels[curLv];
            document.getElementById('lv').innerText = curLv + 1;
            document.documentElement.style.setProperty('--cols', lv.c);
            document.documentElement.style.setProperty('--rows', lv.r);
            timeLeft = lv.t; updateBar();
            timer = setInterval(() => { timeLeft--; updateBar(); if(timeLeft <= 0) location.reload(); }, 1000);
            matched = 0; shuffles = 3; isProcessing = false;
            generateBoard();
        }

        function generateBoard() {
            const lv = levels[curLv];
            let pairs = [];
            for(let i=0; i<(lv.c * lv.r)/2; i++) { pairs.push(i % imgs.length, i % imgs.length); }
            pairs.sort(() => Math.random() - 0.5);
            const container = document.getElementById('game-board');
            container.innerHTML = ''; board = [];
            for(let r=0; r<lv.r; r++) {
                board[r] = [];
                for(let c=0; c<lv.c; c++) {
                    const id = pairs.pop(); board[r][c] = id;
                    const tile = document.createElement('div');
                    tile.id = `t-${r}-${c}`; tile.className = 'tile';
                    tile.style.backgroundImage = `url('${imgs[id]}')`;
                    tile.onclick = () => clickTile(r, c);
                    container.appendChild(tile);
                }
            }
            setTimeout(checkDeadlock, 1000);
        }

        function clickTile(r, c) {
            if (isProcessing || board[r][c] === -1) return;
            const tileEl = document.getElementById(`t-${r}-${c}`);
            tileEl.classList.add('selected');
            selected.push({r, c, id: board[r][c]});

            if(selected.length === 2) {
                isProcessing = true;
                const [a, b] = selected;
                if(a.id === b.id && (a.r !== b.r || a.c !== b.c)) {
                    document.getElementById(`t-${a.r}-${a.c}`).classList.add('matched');
                    document.getElementById(`t-${b.r}-${b.c}`).classList.add('matched');
                    board[a.r][a.c] = -1; board[b.r][b.c] = -1;
                    score += 100; document.getElementById('sc').innerText = score;
                    matched += 2;
                    if(matched === levels[curLv].c * levels[curLv].r) {
                        curLv < levels.length - 1 ? (curLv++, setTimeout(loadLevel, 500)) : alert("CHIẾN THẮNG!");
                    } else {
                        setTimeout(() => { checkDeadlock(); isProcessing = false; }, 400);
                    }
                } else {
                    setTimeout(() => {
                        document.getElementById(`t-${a.r}-${a.c}`).classList.remove('selected');
                        document.getElementById(`t-${b.r}-${b.c}`).classList.remove('selected');
                        isProcessing = false;
                    }, 300);
                }
                selected = [];
            }
        }

        function checkDeadlock() {
            let active = [];
            board.forEach(row => row.forEach(id => { if(id !== -1) active.push(id); }));
            let counts = {};
            active.forEach(id => counts[id] = (counts[id] || 0) + 1);
            let hasPairs = false;
            for(let id in counts) { if(counts[id] >= 2) { hasPairs = true; break; } }
            if(!hasPairs && active.length > 0) {
                if(shuffles > 0) shuffleLogic(true);
                else { alert("Hết nước đi!"); location.reload(); }
            }
        }

        function shuffleLogic(auto) {
            let currentImgs = [];
            board.forEach(row => row.forEach(id => { if(id !== -1) currentImgs.push(id); }));
            currentImgs.sort(() => Math.random() - 0.5);
            board.forEach((row, r) => {
                row.forEach((id, c) => { if(board[r][c] !== -1) board[r][c] = currentImgs.pop(); });
            });
            if(!auto) { shuffles--; }
            board.forEach((row, r) => {
                row.forEach((id, c) => {
                    const tile = document.getElementById(`t-${r}-${c}`);
                    if (id !== -1) {
                        tile.style.backgroundImage = `url('${imgs[id]}')`;
                        tile.classList.remove('matched');
                    }
                });
            });
        }

        function shuffleBtn() { if(!isProcessing && shuffles > 0) shuffleLogic(false); }
        function updateBar() { document.getElementById('timer-bar').style.width = (timeLeft/levels[curLv].t)*100 + '%'; }
    </script>
</body>
</html>
